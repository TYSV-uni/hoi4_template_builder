l_english:
##CZECHOSLOVAKIA##
MUN_czech_skoda_priority.t: "The Škoda Works"
MUN_czech_skoda_priority.d: "The Škoda Works company produces a wide range of products, from artillery to tanks, trains and naval guns. This results in a lot of versatility by shifting resources to where demand is the highest, which we can now partly direct."
MUN_czech_skoda_priority.1.a: "Interesting"
MUN_czech.2.t.1:0 "Sudetenland Paramilitaries ask for help"
MUN_czech.2.t.2:0 "Sudetenland Free Corps ask for help"
MUN_czech.2.t.3:0 "Sudeten Worker Militias ask for help"
MUN_czech.2.d.1:0 "In light of the recent news of our designs on [CZE.getname], many Sudetenland political parties have quickly formed paramilitaries all over the region in hopes of undermining the [CZE.GetAdjective] government. They are now asking for our support in executing cross-border raids and committing acts of sabotage to help our own efforts against [CZE.getname]."
MUN_czech.2.d.2:0 "In light of the recent news of our designs on [CZE.getname], the Sudetenland political parties have quickly mobilized their paramilitary: the Sudeten Free Corps. Free Corp units throughout Sudetenland have formed units and have started attacking [CZE.GetAdjective] government property in the Sudetenland. They are now asking for our full support in helping them execute cross-border raids and commit acts of sabotage against [CZE.getname]."
MUN_czech.2.d.3:0 "In light of the recent news of our designs on [CZE.getname], the local communist parties quickly mobilized worker militias. These worker militias have started attacking [CZE.GetAdjective] government property in the region. They are now asking for our full support in helping them execute cross-border raids and commit acts of sabotage against [CZE.getname] and other counterrevolutionaries."
MUN_czech.2.a:0 "Of course we'll help"
MUN_czech.2.b:0 "Might be better to not enable them further"
MUN_czech.3.t: "Sudetenland Partisan Activity"
MUN_czech.3.d: "In the wake of recent [FROM.getname] interest in annexing the Sudetenland, paramilitaries have started engaging in skirmishes against us. They have started to attack government buildings and are to undermining our defenses in a few areas. If we hope to improve our military situation in the area, we need to deal with these paramilitary groups."
MUN_czech.3.a: "How can this get any worse?"
MUN_czech.4.t: "Crisis of Confidence"
MUN_czech.4.d: "The recent news of military aggression against us has shaken the government to its core. [CZE.GetLeader] has lost faith in his government's ability to lead the country through this crisis. He has demanded that $CZE_jan_syrovy$ take command of the situation and lead the country. $CZE_jan_syrovy$ has said that he is reluctant to lead, however in light of this [CZE.GetLeader] has told him that he has no choice but to take command and lead us through this crisis."
MUN_czech.4.a: "We need you more than ever."
MUN_czech.4.b: "We mustn't lose our heads."
MUN_czech.5.t: "Tomáš Masaryk Passes Away"
MUN_czech.5.d: "Masaryk was a stabilizing figure in Czechoslovak politics for well over two decades. When coalitions were thought impossible to build and political impasses too big to overcome, Masaryk, time after time, was able to pull off political miracles to help strengthen and grow Czechoslovakia to what it is today. His presence will be greatly missed and will be felt throughout the nation."
MUN_czech.5.a: "An irreplaceable political giant."
MUN_czech.7.t: "Reevaluating Commits to [CZE.getnamedef]"
MUN_czech.7.d: "News has recently reached us that [GER.getnamedef] wishes to annex the Sudetenland, and would be willing to go to war with [CZE.getnamedef] to achieve this goal. We currently have a defensive agreement with [CZE.getnamedef], meaning that if they go to war with [GER.getnamedef], we'd be obligated to come to their aid. If we want to avoid this outcome, we need to get out of our defensive agreements with [CZE.getnamedef] immediately."
MUN_czech.7.a: "We stand by our friends"
MUN_czech.7.b: "We wouldn't stand a chance against [GER.getnamedef]"
MUN_czech.1001.t: "[FROM.GetNameDefCap] Demands a Corridor to [SOV.GetNameDef]"
MUN_czech.1001.d: "Hoping to coordinate military actions with [SOV.GetNameDef], [FROM.GetNameDef] has demanded that we cede the border regions of [89.GetName] and [91.GetName] to them."
MUN_czech.1002.t: "[FROM.GetNameDefCap] Demands Influence Over the Yugoslav League"
MUN_czech.1002.d: "After expanding southwards, [FROM.GetName] has come with an unusual demand. They demand not the seizure of land, but control over the Yugoslav Defense League, becoming protector and overlord of north-Balkan countries that our currently our subjects. They say they would be a more capable protector than us, but that could of course just be an excuse."
MUN_czech.1002.a: "Perhaps they are right"
MUN_czech.1002.b: "No, they are under our protection!"
MUN_czech.1003.t: "[FROM.GetName] Refuses Demands"
MUN_czech.1003.d: "Despite the convincing arguments of our diplomats, [FROM.GetNameDef] has refused to give in to our demands."
MUN_czech.1003.a: "They leave us with no other option"
MUN_czech.1004.t: "[FROM.GetName] Moves Against Hungary"
MUN_czech.1004.d: "News has reached [ROOT.capital.GetCapitalVictoryPointName] of [FROM.GetAdjective] troops advancing towards the [HUN.GetAdjective] border. Although [HUN.GetAdjective] representatives will undoubtedly contact us soon, we should already figure out whether to assist [HUN.GetNameDef] and gain a potential ally, or whether we should let [FROM.GetNameDef] continue its current plans."
MUN_czech.1004.a: "We should protect our interests"
MUN_czech.1004.b: "Let's stay out of this"
MUN_czech.1005.t: "[FROM.GetName] Demands Coastal Territory"
MUN_czech.1005.d: "With [FROM.GetNameDef] steadily growing its realm, representatives from them have now come to demand that we cede land that [FROM.GetAdjective] nobles once owned to them. They say this would give them potential access to the Adriatic, apparently not so interested in our thoughts on the matter."
MUN_czech.1006.t: "[FROM.GetName] Proposes Partnership"
MUN_czech.1006.d: "[FROM.GetNameDef] has approached us with a mutual defense treaty, seeking to dissuade any attackers with the combined might of our armies. Interestingly however, there is also a secret part of the treaty, where potential expansion of [ROOT.GetAdjective] influence is laid out, and how [FROM.GetNameDef] could assist."
MUN_czech.1007.t: "[FROM.GetName] Demands Alignment"
MUN_czech.1007.d: "Mistrust between us and [FROM.GetNameDef] ever since their establishment has lead to them now demanding our alignment or risk an invasion. Interestingly however, [FROM.GetNameDef] is also appealing to our territorial ambitions, and promising that in return for no longer pursuing our claims on their lands, they may help us obtain the other lands we claim."
MUN_czech.1007.b: "We must maintain our sovereignty!"
MUN_czech.1008.t: "[FROM.GetName] Suggests Allying [CZE_invited_country.GetName]"
MUN_czech.1008.d: "Representatives from [FROM.GetNameDef], our bridge to central Europe, has proposed expanding our alliance by inviting [CZE_invited_country.GetName]."
MUN_czech.1008.a: "Further deterrence against attacking us"
MUN_czech.1008.b: "We cannot be expected to defend all of Europe"
MUN_czech.1009.t: "[FROM.GetName] Invites Us to the [CZE.GetFactionName]"
MUN_czech.1009.d: "Diplomats from [FROM.GetNameDef] have communicated that we would be welcome in their alliance. In the past however, our territorial claims were a point of contention in relations with [FROM.GetNameDef]. We must now decide whether to still press those claims, or focus on establishing more friendly relations."
MUN_czech.1009.a: "To our new ally!"
MUN_czech.1009.b: "We will join after our claims are recognized"
MUN_czech.1009.c: "We are not interested"
MUN_czech.1010.t: "[FROM.GetName] Invites Us to Lead the [CZE.GetFactionName]"
MUN_czech.1010.d: "After recently trying to turn the Little Entente agreements into a real alliance, [FROM.GetNameDef] has come with a proposal: they want us to lead this new faction. They would concede leadership and in return would gain us as a valuable protector, a deal that would expand our sphere, but potentially with nations that are under threat."
MUN_czech.1010.a: "They would be valuable allies"
MUN_czech.1010.b: "Protecting [ROOT.GetNameDef] is enough"
MUN_czech.1011.t: "[FROM.GetName] Proposes Protection Agreement"
MUN_czech.1011.d: "As part of an effort to discourage any aggression towards [FROM.GetNameDef], their diplomats have approached us with the draft of a mutual defense treaty. In return for our backing, they would offer the same protection to us, forcing any aggressor into a two-front war."
MUN_czech.1011.a: "It is worth the risk"
MUN_czech.1011.b: "Neutrality is safer"
MUN_czech.1012.t: "[FROM.GetName] Demands Our Subjugation"
MUN_czech.1012.d: "Emboldened by their newly established alliance, [FROM.GetNameDef] have arrived with a series of demands that would equate to the loss of our sovereignty. With the backing of [SOV.GetName] given its interest in the region, we must now decide if we can afford refusing."
MUN_czech.1012.a: "Resistance would waste [ROOT.GetAdjective] lives"
MUN_czech.1012.b: "Death before dishonor!"
MUN_czech.1013.t: "[FROM.GetName] Offers Conditional Alliance"
MUN_czech.1013.d: "After careful deliberation, the government of [FROM.GetNameDef] announced that it shares the view that an alliance would be advantageous, however, they also announced that they could not overlook their territorial claims. Therefore they have come with a proposal: they will join our faction, but only if we cede them the territory they claim."
MUN_czech.1013.a: "A sacrifice worth making"
MUN_czech.1013.b: "We are trying to protect our territory!"
MUN_czech.1014.t: "[FROM.GetName] Requests Protection"
MUN_czech.1014.d: "Influential diplomats from [FROM.GetNameDef] have approached the foreign minister, requesting that we solidify the vague protection promises outlined in the 1935 Czechoslovak-Soviet treaty."
MUN_czech.1014.a: "Perhaps we should try to protect our ally"
MUN_czech.1014.b: "Let's keep it at vague promises"
MUN_czech.1015.t: "[FROM.GetName] Proposes Merging Our Factions"
MUN_czech.1015.d: "With us now having the same enemies, [FROM.GetName] has come to us with a proposal that would deepen our cooperation by integration our faction into theirs."
MUN_czech.1015.a: "A coordinated effort would save lives"
MUN_czech.1015.b: "We must be in control"
MUN_czech.1016.t: "[FROM.GetName] Proposes Non-Aggression Pact"
MUN_czech.1016.d: "Continuing on the basis of previous talks that were cancelled after a change in foreign policy plans, [FROM.GetNameDef] has proposed to continue talks on a non-aggression pact."
MUN_czech.1016.a: "One less border to protect"
MUN_czech.1016.b: "This will get in the way of our ambitions"
MUN_czech.1017.t: "A Joint Invasion of [GER.GetNameDef]?"
MUN_czech.1017.d: "[FROM.GetNameDef] has approached the top of the [ROOT.GetAdjective] with secret plans to invade [GER.GetNameDef]. After showing how committed they are to eliminating the [GER.GetAdjective] threat, they requested that we would assist, to together overwhelm the mighty [GER.GetAdjective] army."
MUN_czech.1017.a: "We will strike [GER.GetNameDef] with them"
MUN_czech.1017.b: "This is far too dangerous"
MUN_czech.1018.t: "Fight Alone Against [GER.GetNameDef]?"
MUN_czech.1018.t.2: "A Joint Invasion of [GER.GetNameDef]"
MUN_czech.1018.d: "Despite our best diplomatic efforts, we were not able to gather any foreign support for the preemptive invasion of [GER.GetName] the question now is whether to go through with our attack plans at all."
MUN_czech.1018.d.FRA_POL: "Great news has arrived from both [FRA.GetNameDef] and [POL.GetNameDef], our diplomats reporting that both nations have committed to assist us in an invasion of [GER.GetNameDef]."
MUN_czech.1018.d.FRA: "Our diplomats have returned from [FRA.GetNameDef] with the great news that they would be willing to take part in a joint invasion of [GER.GetNameDef], we must now evaluate if our combined forces would be sufficient."
MUN_czech.1018.d.POL: "Our diplomats have returned from [POL.GetNameDef] with the great news that they would be willing to take part in a joint invasion of [GER.GetNameDef], we must now evaluate if our combined forces would be sufficient."
MUN_czech.1018.a: "They will never see it coming"
MUN_czech.1018.b: "In hindsight, it's too risky"
MUN_czech.1019.t: "[FROM.GetName] Demands [762.GetName]"
MUN_czech.1019.d: "Citing a desire to restore previous Bohemian borders, and to legitimize their control over [72.GetName], [FROM.GetAdjective] representatives have delivered an ultimatum that demands we cede [762.GetName]."
MUN_czech.1019.a: "Perhaps it will keep us safe"
MUN_czech.1020.t: "[FROM.GetName] Offers Conditional Investment"
MUN_czech.1020.a: "A great deal!"
MUN_czech.1020.b: "These terms are unacceptable"
MUN_czech.1020.d: "Diplomats have arrived from [FROM.GetNameDef], outlining an agreement where their nation would invest in our industry and infrastructure, in return for a resource agreement. This move, coming after failed investments in previous years, suggests a renewed effort in improving our relations."
CZE_investment_effects_tt: "In §Y100 days§! we will gain:\n§YInfrastructure§! in §Y3§! random states.\n§YCivilian Factory§! in §Y1§! random state.\n"
MUN_czech.1021.t: "Return of the Austro-Hungarian Customs Union?"
MUN_czech.1021.d: "[CZE.GetNameDefCap] has approached us with a draft trade agreement between the former Austro-Hungarian nations. Although happy with their independence, the new [CZE.GetAdjective] government seems especially willing to restore the beneficial elements of the Austria-Hungarian nation."
MUN_czech.1021.a: "More trade sounds appealing"
MUN_czech.1021.b: "We must protect our domestic producers"
MUN_czech.1022.t: "[CZE.GetName] Seizes Silesia"
MUN_czech.1022.d: "After fierce fighting around the mountains of [69.GetName], [CZE.GetAdjective] troops ended up breaking through, and establishing control over all of Silesia, before the troops they had clashed with were recovered enough to offer serious resistance."
MUN_czech.1022.a: "We must intervene"
MUN_czech.1022.b: "We cannot create yet another enemy"
MUN_czech.1022.c: "A great victory!"
MUN_czech.1023.t: "[CZE.GetName] Starts Struggle for Silesia"
MUN_czech.1023.d: "Citing some antiquated reasoning regarding medieval kingdoms and empires, [FROM.GetNameDef] has escalated border skirmishes into a limited war in an effort to establish control over [ROOT.GetAdjective] Silesia."
MUN_czech.1023.a: "Ready the troops"
MUN_czech.1024.t: "[CZE.GetName] Proposes Peacedeal"
MUN_czech.1024.d: "After border skirmishes in Silesia turned into a full-scale war, [FROM.GetNameDef] has now indicated its willingness to end the conflict if the land they claimed is ceded."
MUN_czech.1024.a: "Perhaps we should focus on other areas"
MUN_czech.1024.b: "The situation is still in our favor"
MUN_czech.1024.c: "This is not up for negotiation!"
MUN_czech.1025.t: "End of Spanish Volunteer Mission"
MUN_czech.1025.d.1: "The [ROOT.GetAdjective] troops sent to [CZE_supported_spanish_faction.GetName] are returning home after helping them achieve victory. The fighting has led to new insights for our troops, and especially their medical detachments."
MUN_czech.1025.d.2: "Despite the valiant fighting of [ROOT.GetAdjective] forces in the Spanish Civil War, the side we supported was ultimately defeated. Despite this, our troops and especially their medical teams learnt valuable lessons."
MUN_czech.1025.a: "Let's hope we won't have to put these lessons to use at home"
MUN_czech.1026.t: "[FROM.GetName] Refuses Proposal"
MUN_czech.1026.a: "Their loss"
MUN_czech.1026.b: "A worrying development"
MUN_czech.1026.france_refuses_to_lead: "Despite the leadership role [FROM.GetAdjective] was offered in return for joining our alliance, they have decided not to do so. It seems the [FROM.GetAdjective] is trying to stay neutral, or is biding time."
MUN_czech.1026.sphere_of_influence: "Although [FROM.GetAdjective] government members assured us that our participation in the [ROOT.GetFactionName] is appreciated, they said expanding our influence into the Balkans would go to far and may scare of potential allies."
MUN_czech.1026.guarantee: "Our diplomats report that despite their efforts, [FROM.GetNameDef] did not agree with our proposal of a mutual defense agreement. It seems they estimate that we are at more risk than them, let's hope they are wrong."
MUN_czech.1026.faction_merge: "Despite our best efforts, our and [FROM.GetAdjective] diplomats could not come to agree on a deal to unify [ROOT.GetFactionName] and [FROM.GetFactionName]."
MUN_czech.1026.non_aggression: "Despite assurances of their peaceful intentions, [FROM.GetAdjective] diplomats refused to sign a non-aggression pact with our nation, why remains to be seen."
MUN_czech.1026.trade_deal: "Citing a desire to remain economically independent, [FROM.GetNameDef] has refused our trade agreement proposal."
MUN_czech.1026.faction_invite: "Although our diplomats communicated the arguments why [FROM.GetNameDef] would benefit from an alliance with us, they were ultimately unsuccessful in aligning them."
MUN_czech.1026.weapons_sale: "Despite our generous offer, [FROM.GetNameDef] has decided not to buy weapons from us at this moment."
MUN_czech.1026.unification: "Despite acknowledging the benefits a federation would bring, [FROM.GetNameDef] has chosen to keep its government in exile as the sole legitimate government for its lands."
MUN_czech.1026.white_peace: "Our representatives returned with the sad news today that despite our occupation of [66.GetName], the [FROM.GetAdjective] leadership is not willing to sign a peace treaty. It seems we will have to either go further in our conquest, or hope to tire them out."
MUN_czech.1027.t: "Establish a [FROM.GetAdjective]-[ROOT.GetAdjective] Trade Deal?"
MUN_czech.1027.d: "Despite initial ideological differences, [FROM.GetNameDef] has appealed to our pragmatism in approaching us for a trade deal. In return for [FROM.GetAdjective] being allowed to extract resources in [202.GetName], they help provide the machine tools that we so desperately need to expand our industrial capacity."
MUN_czech.1027.a: "Damn good deal."
MUN_czech.1027.b: "We should deny them those resources."
MUN_czech.1028.t: "Delayed Fortification Efforts"
MUN_czech.1028.d: "Many within the country are now questioning why the government has not continued the fortification projects it had started late last year. The government had earmarked funds for additional fort-building projects through the Fortification Council. With no progress on the program forthcoming, people are demanding that the project either be continued or its funds returned. If we do wish to continue our fortification programs, there is no time to lose in getting the projects restarted so they can be finished on time."
MUN_czech.1028.a: "We have no time to lose!"
CZE_no_time_to_lose_tt: "Our window of time to complete our Fortification Projects before a threat emerges is now very narrow."
MUN_czech.1029.t: "Fortification Project has Finished"
MUN_czech.1029.d: "Our most recent fortification project has been completed and resources are available to start another project. Our engineers are ready to deploy to another location at a moment's notice to start the groundwork on a new fortification line."
MUN_czech.1029.a: "Excellent work gentlemen"
MUN_czech.1030.t: "[FROM.GetName] Demands Integration"
MUN_czech.1030.d: "[FROM.GetNameDefCap] has demanded that we become part of their union as they seek to expand it. Although they appeal to various countries in the region with various different reasons, Pan-Slavism, Pan-Balkanism and shared history in the Austro-Hungarian empire for others, the appeal also comes with a clear implied threat if we refuse."
MUN_czech.1030.a: "Perhaps that wouldn't be so bad"
MUN_czech.1030.b: "Not very convincing"
MUN_czech.1031.t: "[FROM.GetName] Proposes Union"
MUN_czech.1031.d: "Although [ROOT.GetNameDef] capitulated, the [FROM.GetAdjective] government has come with a drastic proposal that would allow us to fight on: merging what remains of our nation with theirs."
MUN_czech.1031.a: "Together we can better protect our homelands"
MUN_czech.1031.b: "Our differences are too great"
MUN_czech.1032.t: "Bridging the Divide"
CZE_divide_nation_title_dynamic_sudentenland: "$MUN_czech.1032.t$ in the Sudetenland"
CZE_divide_nation_title_dynamic_czech_states: "$MUN_czech.1032.t$ with Czech Workers"
CZE_divide_nation_title_dynamic_tesinko_poles: "$MUN_czech.1032.t$ in [72.GetName]"
CZE_divide_nation_title_dynamic_slovakia_states: "$MUN_czech.1032.t$ in [SLO.GetNonIdeologyName]"
CZE_divide_nation_title_dynamic_hungarian_states: "$MUN_czech.1032.t$ in [664.GetName]"
CZE_divide_nation_title_dynamic_ukrainian_states: "$MUN_czech.1032.t$ in [73.GetName]"
MUN_czech.1032.d: "Recent efforts to solve issues in [FROM.getname] have been successful in alleviating anger towards the central government, at least for the time being. Our government's resources are now freed up to commit to other social or economic programs that will continue to fight issues that are dividing our country."
MUN_czech.1032.a: "Let's get at it again"
MUN_czech.1033.t: "The [FROM.GetAdjective] Government-In-Exile Requests Recognition"
MUN_czech.1033.d: "The [FROM.GetAdjective] Government-In-Exile under $CZE_edvard_benesh$ is requesting that we host their delegation as it struggles to regain the sovereignty of [CZE.GetNonIdeologyName]."
MUN_czech.1033.a: "Another ally against the [GER.GetAdjective]s"
MUN_czech.1033.b: "They are illegitimate"
MUN_czech.1034.t: "Unrest in Slovakia"
MUN_czech.1034.d: "Due to us giving in to nationalist sentiments by other groups, members of the Slovak People's Party have formed their own paramilitary force that now seeks its own independence or at least autonomy for Slovakia. The question now stands whether to focus on maintaining a semblance of unity through preventing this, or to achieve it by allowing it and focusing on the lands that are loyal to the government."
MUN_czech.1034.a: "Send the army into Slovakia!"
MUN_czech.1034.b: "Arrest them but grant some autonomy"
MUN_czech.1034.c: "Take direct control"
MUN_czech.1034.c_tt: "§RWe will be at the mercy of [GER.GetNameDef]'s decision regarding the fate of Czechoslovakia.§!"
MUN_czech.1035.t: "[FROM.GetName] Offers to Manufacture Weapons for Us"
MUN_czech.1035.d: "Our integral partnership with [CZE.GetNameDef] has lead them to offer a unique deal: they will manufacture weapons for us that we currently construct domestically, for a price, of course. This in turn would allow us to focus on the other sectors of our industry."
MUN_czech.1035.a: "This means fewer duplicated efforts"
MUN_czech.1035.b: "We can't make our army dependent on foreign equipment"
#MUN_czech.1036.t: "" #Event uses MUN_czech.1032.t
MUN_czech.1036.d: "The Great depression has done our nation no favors economically or politically. Many regional economic and political issues plague us, and they seem to be getting worse even in the face of our miraculous recovery from the Great Depression. We need to tackle these issues before they divide our nation further."
MUN_czech.1036.a: "We need to heal our nation"
CZE_divided_nation_event_onbroad_tt: "Unlocked §YDecisions§! that allow us to §YRemove§! the negative §YState Modifiers§! on our Core States.\n\nCompleting these §YDecisions§! will also lower the Negative Modifiers on the §Y$CZE_a_divided_nation_dynamic_modifier$§! National Spirit until it is §YRemoved§!."
MUN_czech.1037.t: "[GER.GetName] Protects [HUN.GetName]"
MUN_czech.1037.d: "After noticing the obvious war justifying going on in our country towards [HUN.GetNameDef], [GER.GetAdjective] representatives have made clear that going to war with the [HUN.GetAdjective]s would mean war with [GER.GetNameDef] as well. Whether to proceed now is up to us."
MUN_czech.1037.a: "Our plans must be cancelled"
MUN_czech.1037.b: "This changes nothing"
MUN_czech.1038.t.1: "[FROM.GetName] Offers to License its Tank Designs"
MUN_czech.1038.t.2: "[FROM.GetName] Offers to Sell Guns"
MUN_czech.1038.t.3: "[FROM.GetName] Offers to Sell Artillery"
MUN_czech.1038.t.4: "[FROM.GetName] Offers to Sell Light Tanks"
MUN_czech.1038.t.5: "[FROM.GetName] Offers to Sell Fighters"
MUN_czech.1038.d: "Representatives from the [FROM.GetAdjective] government and their weapon companies have approached us with a proposal for a weapons sale. The price seems fairly normal, and the [FROM.GetNameDef] also offers some weapons that are very modern."
MUN_czech.1038.a: "Sounds like a good deal"
MUN_czech.1039.t: "[RUT.getname] Wants Autonomy Agreement"
MUN_czech.1039.d: "In light of the Autonomy Agreement, we gave [SLO.getname], $RUT_augustin_voloshyn$ has inquired about his region having the same sort of federalization agreement with us. This seems absurd, but given the circumstances, we have to take these demands at face value."
MUN_czech.1039.a: "We'll see about that"
MUN_czech.1040.t: "[CZE.getname] offers us a Customs Union Treaty"
MUN_czech.1040.d: "[CZE.getnameDEFCAP] has recently revisited diplomatic talks regarding a customs union between our two nations. The deal they are trying to strike seems fair, but may include other demands later that we may not be prepared for. This treaty and what's being traded seems trivial and symbolic, so there won't no harm in signing it."
MUN_czech.1040.a: "Seems harmless"
MUN_czech.1040.b: "This can't be trusted"
MUN_czech.1041.t: "[FROM.getname] Declines Custom Unions Treaty"
MUN_czech.1041.d: "Citing some reasons about how this treaty could upset their economy, [From.getname] has declined to sign the customs union treaty between our two nations. These reasons seem like baseless excuses without merit."
MUN_czech.1041.a: "Disappointing"
MUN_czech.1042.t: "[FROM.getname] Agrees to the Custom Unions Treaty"
MUN_czech.1042.d: "Seeing that the Treaty is satisfactory, [FROM.getname] has agreed to the terms. Hopefully, this is the first step toward closer ties between our two nations."
MUN_czech.1042.a: "Excellent"
MUN_czech.1043.t: "[FROM.getname] Demands We Join Their Federation"
MUN_czech.1043.d: "Citing the closer ties between our two nations and recent developments around the world. [FROM.getname] has said that it would be better under their protection than all alone. This does seem like a ploy for them to simply occupy our territory. What should we do?"
MUN_czech.1043.a: "We accept"
MUN_czech.1043.b: "A terrible idea"
MUN_czech.1044.t: "[FROM.getname] Declines to Join the Federation"
MUN_czech.1044.d: "Seeing that they would be better off alone then under us . [FROM.getname] has rejected the chance to join our federation. This is a blow to our goal of strengthening our position within Europe. What should we do now that [FROM.getname] will not come to their senses."
MUN_czech.1044.a: "That's a shame"
MUN_czech.1044.b: "We'll have to try other means"
MUN_czech.1045.t: "[FROM.getname] Agrees to Join the Federation"
MUN_czech.1045.d: "Seeing that they would be better protected under us then by themselves. [FROM.getname] has wisely joined our federation. This will greatly strengthen our position within Europe."
MUN_czech.1045.a: "Excellent"
MUN_czech.1046.t: "Healing the Divide"
MUN_czech.1046.d: "Having tackled many issues within our country, the tensions within our nation seem to be subsiding. After finishing many economic and social programs it now seems our country is now starting to heal."
MUN_czech.1046.a: "Great news"
#MUN_czech.1047 is hidden
MUN_czech.1048.t: "[FROM.GetName] Accepts Demands"
MUN_czech.1048.t2: "[FROM.GetName] Agrees to Proposal"
MUN_czech.1048.d: "Reluctantly, [FROM.GetAdjective] officials have informed us that they intend to give in to our territorial demands. Already, [FROM.GetAdjective] troops are withdrawing from the territory."
MUN_czech.1048.d2: "After lengthy discussions, our officials and those from [FROM.GetNameDef] have successfully agreed to a new role of the [FROM.GetAdjective] economy as part of our union. This arrangement is sure to bring prosperity to both our citizens."
MUN_czech.1048.d3: "Our proposal of a non-aggression pact was met with immediate enthusiasm by [FROM.GetAdjective] representatives, it seems their ambitions are currently focused elsewhere."
MUN_czech.1048.d4: "Finding themselves under grave threat, [FROM.GetNameDef] has given into our demands for alignment."
MUN_czech.1048.d5: "After lengthy discussions, our officials and those from [FROM.GetNameDef] have successfully reached an agreement where a part of our military industry will be dedicated to producing equipment for them. In return, we will receive trade goods for our markets and production."
#MUN_czech.1049 is a faction joining event so largely reuses generic loc
MUN_czech.1049.d: "The new government of [FROM.GetNameDef] has approached us proposing an alliance. Despite the initial anti-German stance of their new military government, it seems they have been pragmatic and recognized that their old international partners are unreliable."
MUN_czech.1050.d: "Our diplomats returned from [FROM.GetNameDef] with the disappointing news that our request to join their alliance was denied. Although the reasons are unclear, we are now in the difficult situation where we've exposed our worries about our traditional allies, without being able to gain a new one."
MUN_czech.1050.a: "Then perhaps we should offer more favorable terms"
MUN_czech.1050.b: "Let us search for better allies"
MUN_czech.1051.t: "[FROM.GetName] Requests Sphere of Influence"
MUN_czech.1051.d: "Our new ally, [FROM.GetNameDef] has expressed its interest in expanding its influence across its borders. Consequently, [FROM.GetAdjective] representatives have come seeking permission and support for this expansion, where a clear boundry between areas under [ROOT.GetAdjective] and [FROM.GetAdjective] influence is to be set."
MUN_czech.1051.a: "We should strengthen our key [FROM.GetAdjective] ally"
MUN_czech.1052.t: "[FROM.GetName] Requests We Allow Passage for [SOV.GetAdjective] Troops"
MUN_czech.1052.d: "After a new diplomatic agreement between [FROM.GetNameDef] and [SOV.GetNameDef], [FROM.GetNameDef] feels confident that [SOV.GetNameDef] would protect them in case of conflict. The only obstacle is the lack of a land connection between the two, consequently, [FROM.GetAdjective] diplomats have approached our government, requesting that we would allow the passage of [SOV.GetAdjective] troops through our territory to [FROM.GetNameDef] if a conflict does take place."
MUN_czech.1052.a: "Their fighting will protect us too"
MUN_czech.1053.t: "[FROM.GetName] Pressures Us with [HUN.GetAdjective] Claims"
MUN_czech.1053.d: "After turning [HUN.GetNameDef] into a client state, [FROM.GetNameDef] is now demanding that we accept the same fate. They threaten that if we refuse, they would support [HUN.GetAdjective] claims on [ROM.GetAdjective] territory. Now we must choose between losing our sovereignty or potentially compromising our territorial integrity."
CZE_cancel_anti_hungary_focus_tt: "Cancels focus §Y$CZE_neutralize_the_hungarian_threat$§!"
MUN_czech.1054.t: "Joint Invasion of [LIT.GetName]?"
MUN_czech.1054.d: "As agreed previously, [FROM.GetNameDef] has come with a proposition that would help strengthen our nation. Namely by unifying forcibly with [LIT.GetNameDef], this would give us access to additional resources and would deny the enemy the possibility of attacking us through [LIT.GetNameDef]."
MUN_czech.1054.a: "We must expand to resist the expansion of others"
MUN_czech.1055.t: "[SOV.GetAdjective] Volunteers Arrive"
MUN_czech.1055.d: "In unprecedented feat of aerial logistics, [SOV.GetNameDef] has used its air force to deploy several divisions of volunteers to our airport in [73.GetName] to support our current war effort."
MUN_czech.1056.t: "[FROM.GetName] Demands [975.GetName]"
MUN_czech.1056.d: "Just like once proposed in the Paris Peace Conference after the Great War, [CZE.GetNameDef] has announced it deems a corridor to its ally, [YUG.GetNameDef], necessary for their alliance's safety. In order to achieve that goal, [FROM.GetAdjective] representatives have delivered an ultimatum that demands we cede [975.GetName]."
#THE FALL OF THE REPUBLIC EVENTS#
MUN_the_fall_of_the_republic.1.t: "Widespread Outbreak of Protests"
MUN_the_fall_of_the_republic.1.d: "[ROOT.GetLeader]'s recent decision to give up the Sudetenland has led to an outbreak of protests throughout the nation. While the political and military leadership wanted to avoid bloodshed in what they thought was pointless resistance in the face of impossible odds, many throughout the nation felt that they made the wrong decision. Some political movements are now moving in to take advantage of the turmoil to further their own goals."
MUN_the_fall_of_the_republic.1.a: "We had no choice!"
MUN_the_fall_of_the_republic.2.t.1: "The Fall of the First Republic"
MUN_the_fall_of_the_republic.2.t.2: "Chaos within the Government"
MUN_the_fall_of_the_republic.2.d: "In the wake of the government's choice to Surrender the Sudetenland a large wave of resignations of junior leadership in the army and government has bombarded our country. Some of these people have reportedly fled the country overnight. Major changes are required within our government to stem the bleeding of officials leaving and to restore some faith in our ability to lead."
MUN_the_fall_of_the_republic.2.a: "We need radical changes."
MUN_the_fall_of_the_republic.2.b: "We must stay the course!"
MUN_the_fall_of_the_republic.3.t: "[RUT.getname] asks for Autonomy"
MUN_the_fall_of_the_republic.3.d: "With the recent political chaos that has befallen our nation the small region of Carpatho Ukraine wishes to be more autonomous from [9.GetCapitalVictoryPointName]. Citing long-standing differences between the region and the rest of [ROOT.getname]. However, this request seems like local leaders seizing an opportunity to empower themselves. Denying this request would cost a lot of political capital at a moment where we have none to spare."
MUN_the_fall_of_the_republic.3.a: "Sure, why not?"
MUN_the_fall_of_the_republic.3.b: "Absolutely not!"
MUN_the_fall_of_the_republic.3.c: "Cut them loose."
MUN_the_fall_of_the_republic.4.t: "The Fate of [RUT.getname]"
MUN_the_fall_of_the_republic.4.d: "In the aftermath of the recent chaos that had befallen [CZE.getname], the small region of [RUT.getname] has fallen outside of any country's borders. The small region is claiming to be an independent country and is making diplomatic outreaches to its neighbors. Many within our government worry about such a strategically important region on our border falling into someone else's hands. The army has suggested issuing the breakaway region an ultimatum immediately demanding their annexation."
MUN_the_fall_of_the_republic.4.a: "Send them the ultimatum right away!"
MUN_the_fall_of_the_republic.4.b: "This could be risky, let's wait them out."
MUN_the_fall_of_the_republic.5.t: "[FROM.getname] Demands our Annexation!"
MUN_the_fall_of_the_republic.5.d: "After our independence, it was only a matter of time before a neighboring country looked to incorporate us into their territory. [FROM.getname] seems to be the first to do so and is demanding our surrender. What should we do?"
MUN_the_fall_of_the_republic.5.a: "We'll fight you to the last man!"
MUN_the_fall_of_the_republic.5.b: "We have no choice but to say yes."
MUN_the_fall_of_the_republic.6.t: "[FROM.getname] Refuses our Ultimatum!"
MUN_the_fall_of_the_republic.6.d: "In a surprise move, [FROM.getname] has rejected our ultimatum and instead seeks to resort to armed resistance against us. They have given us no choice but to invade. Battle plans and routes of attack have already been formulated, all we have to do is give the order to attack."
MUN_the_fall_of_the_republic.6.a: "We warned them."
MUN_the_fall_of_the_republic.6.a_tt: "This operation will not affect §Y$HUN_pal_teleki$§! unless [RUT.GetNameDef] has allies"
MUN_the_fall_of_the_republic.6.b: "This might backfire, best to hold off."
MUN_the_fall_of_the_republic.7.t: "[FROM.getname] Gives in to Our Demands"
MUN_the_fall_of_the_republic.7.d: "In a surprise to no one, [FROM.getname] has accepted our demands and is willing to be annexed into our country in return for some trivial conditions. The small region had no chance of resisting a nation as powerful as ours. Our northern frontier is now more protected than it was before, and the government is very pleased with the easy victory it has achieved."
MUN_the_fall_of_the_republic.7.a: "Excellent news."
#BOP EVENTS#
MUN_czech_bop.1.t: "The Readiness of the Armada"
MUN_czech_bop.1.d: "The reform efforts of the first half of the decade are starting to bear fruit. The army is currently one of the most modern in Europe. Yet a sense of complacency has started to set in among some politicians and the heads of many industrial conglomerates. If our army is to remain at peak readiness we have to fight against the possible doubts of our army's ability to fight and those who seek to undermine it for their own personal gain."
MUN_czech_bop.1.a: "We'll be ready."
MUN_czech_bop.2.t.1: "The Threat of German Rearmament"
MUN_czech_bop.2.t.2: "Neighboring Countries Military Expansion"
MUN_czech_bop.2.d.1: "[GER.getnameDEFcap]'s recent remilitarization of the Rhineland has scared some of our military and political leaders. While many have faith in the alliances that the country has made and the preparations the army is currently making to face the possibility of a German threat. Some however, are not as confident that we can stand against any [GER.GetAdjective] threat."
MUN_czech_bop.2.d.2: "The recent news that some of our neighbors have taken on programs to greatly expand their militaries has scared some of our military and political leaders. Many have faith in the alliances that the country has made with other nations and the preparations the army is currently making to face the possibility of any foreign threat. Some, however, are not as confident that we can stand up to the possibility of foreign aggression."
MUN_czech_bop.2.a: "We'll be prepared."
MUN_czech_bop.2.a_tt: "The rearmament efforts of our neighbors have caused some within our army to doubt our ability to resist possible aggression. We must reassure the army with our actions."
MUN_czech_bop.3.t: "[CZE.getname] has sent Observers to our Country"
MUN_czech_bop.3.d: "[CZE.getname] has recently sent individuals to our country to observe the ongoing conflict. At the same time one of their small arms manufacturers has contacted some of our diplomats through secondary channels wondering if we'd be interested in buying small arms from them. This would involve smuggling arms to our country due to restrictions placed upon us."
MUN_czech_bop.3.a: "Let's see where this goes."
MUN_czech_bop.3.b: "We can't let them do more than just observe."
MUN_czech_bop_3_tt: "§Y[CZE.getname]§! Gun Manufacturer §Y$CZE_zbrojovka_brno_organization$§! may try to smuggle guns to us."
MUN_czech_bop.4.t: "$CZE_zbrojovka_brno_organization$'s Scheme"
MUN_czech_bop.4.d: "[ETH.getname] has made contact with representatives of $CZE_zbrojovka_brno_organization$ arms manufacturer and is interested in smuggling our guns into the country. Despite the League of Nations sanctions against [ETH.GetNameDef], $CZE_zbrojovka_brno_organization$ is willing to go through with this scheme. Violating the League of Nations mandate would prove unpopular internationally if we get caught."
MUN_czech_bop.4.a: "Let's do it"
MUN_czech_bop.4.b: "This isn't worth the possible backlash"
CZE_gun_smuggling_tt: "Smuggling Weapons into the Country"
CZE_we_got_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! gets caught."
CZE_we_dont_get_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§! not getting caught."
MUN_czech_bop.5.t: "$CZE_zbrojovka_brno_organization$ agrees to Smuggling Scheme"
MUN_czech_bop.5.d: "Having talked with representatives of the Czech government, $CZE_zbrojovka_brno_organization$ have been given a secret go ahead to start smuggling a small amount of small arms into the country. Their expertise will also be available to us through our backchannels."
MUN_czech_bop.5.a: "We'll put these to good use."
MUN_czech_bop_5_tt: "This §YManufacturer§! will be §RRemoved§! after the war ends."
##SLOVAKIA##
MUN_slovakia_little_war.1.t: "Victory in [71.Getname]"
MUN_slovakia_little_war.1.d: "Our army made a good account of themselves in [71.Getname] by defeating the enemy forces in the area. Our Commanders have learned invaluable information and lessons from the battle that they can use going forward."
MUN_slovakia_little_war.1.a: "Excellent work."
MUN_slovakia_little_war.2.t: "Defeat in [71.Getname]"
MUN_slovakia_little_war.2.d: "Despite our best efforts, our forces were defeated in [71.Getname]. The inability to gather enough ammunition and motorized equipment in time for the conflict was a key factor in our loss. Despite this setback, the commanders who were involved in the battle have learned some very important lessons."
MUN_slovakia_little_war.2.a: "Disappointing performance."
MUN_slovakia_little_war.3.t: "Border Clash in [71.Getname]"
MUN_slovakia_little_war.3.d: "Even after gaining our territory in the $GER_first_vienna_award$,  [HUN.getnamedef] still seeks to make further border adjustments with us in [71.getname]. We need to meet this challenge with force to show them that we will not concede our land without a fight."
MUN_slovakia_little_war.3.a: "How dare they!"
MUN_slovakia_little_war.4.t: "Stalemate in [71.Getname]"
MUN_slovakia_little_war.4.d: "Despite our best efforts, our forces were not able to win the skirmish in [71.Getname]. The inability to gather enough ammunition and motorized equipment in time for the conflict was a key factor in our inability to achieve victory. Despite this setback, the commanders who were involved in the battle have learned some very important lessons."
MUN_slovakia_little_war.4.a: "Disappointing."
##NEWS EVENTS##
MUN_czech.news.1.t: "The Sudetenland Crisis"
MUN_czech.news.1.desc: "People in the Sudetenland have started an armed revolt against [CZE.getnameDef]. Reports started coming in that paramilitaries have started to attack police stations and government buildings throughout the region. This has been triggered by recent news that [FROM.getname] seeks to annex the region.\n\nThese revolts seem to be a prelude to a larger conflict between [FROM.getname] and [CZE.GetNameDef]. A conflict that now seems unavoidable."
MUN_czech.news.1.a: "This does not bode well for Europe."
MUN_czech.news.1.b: "Chaos is a Ladder."
MUN_czech.news.1.c: "We will Prevail!"
MUN_czech.news.1.d: "Hopefully, Diplomacy Prevails."
MUN_czech.news.2.t: "[FROM.GetNameDefCap] invades [RUT.GetNameDef]"
MUN_czech.news.2.desc: "\nSomewhere in the recent chain of events that followed the political chaos in [CZE.getname], the small region of [RUT.getname] had fallen outside of any country's borders. The small breakaway state then declared itself an independent nation and started to form militias to try to protect its new statehood.\n\n[FROM.getnamedefcap] has long had designs on the region and seeing the opportunity has promptly invaded the small breakaway state. Their victory over [RUT.getname] seems like foregone conclusion to many observers."
MUN_czech.news.2.a: "Carpathia what?"
MUN_czech.news.2.b: "This will be easy."
MUN_czech.news.2.c: "Come if you dare!"
MUN_slovakia.news.1.t: "Border Skirmishes in [71.Getname]"
MUN_slovakia.news.1.desc: "Despite regaining [664.Getname] in the aftermath of the $GER_first_vienna_award$, [HUN.getnamedef] still seeks to make additional adjustments with its border with [SLO.getnamedef] in [71.Getname].\n\nThis conflict seems like an excuse for [HUN.getnamedef] to test out how strong its military is against a much weaker opposition. The young army of [SLO.getnamedef] may not be ready to meet the challenge before them."
MUN_slovakia.news.1.a: "Squabbling Children."
MUN_slovakia.news.1.b: "We're Prepared for the Task."