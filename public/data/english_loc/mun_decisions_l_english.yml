 CZE_prioritize_export_contracts: "£BoP_left_texticon Prioritize Export Contracts"
 CZE_prioritize_export_contracts_desc: "Our Export Industry is what helped us climb out of the Great Depression. Why should we change our behavior now? Any threat to our nation is overblown anyhow. The Armada can afford to wait."
 CZE_focus_on_export_designs: "£BoP_left_texticon Focus on Export Designs"
 CZE_focus_on_export_designs_desc: "The Armada is very demanding on what they want out of our designs. The export market is more forgiving and they also help fund domestic designs for the Armada. So in reality, the Armada should be really thanking us for how much money we save them in Research and Development. You're welcome Armada."
