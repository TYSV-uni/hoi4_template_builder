 CZE_send_observers_to_the_italo_ethiopian_war_desc: "Sneaking in individuals to observe and make secondary contacts with people involved with the fighting on the ground would provide valuable insight into contemporary army doctrine. It may also open up some other opportunities."
 CZE_send_observers_to_the_italo_ethiopian_war_tt: "§Y$CZE_zbrojovka_brno_organization$§! will inquire about smuggling guns into §Y[ETH.getname]§!."
