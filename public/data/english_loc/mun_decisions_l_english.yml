 ###FORT DECISIONS###

 CZE_the_second_fortification_program_category: "Fortification Programs"
 CZE_the_second_fortification_program_category_desc: "Our countries' less than advantageous border is a pressing national security concern. The countries that surround us have made it clear that they have designs to redraw our borders in their favor. Continuing to fortify our borders will make any possible enemy think twice before attacking us."
 CZE_fate_of_the_ro: "Fate of the Fortification Council"
 CZE_fate_of_the_ro_desc: "The Fortification Council is in charge of gathering finances related to our fortification projects. If those funds are not used for anything soon, people will start to question why the funds were gathered in the first place."
 CZE_bop_army_bunker_maintenance: "Fortification Maintenance Effort" 
 CZE_bop_army_bunker_maintenance_desc: "Having our fortifications be properly maintain and ready for use will ensure that the army is confident in them if they ever need to be manned."
 CZE_fortification_research: "Fortification Research"
 CZE_fortification_research_desc: "The need to fortify our border is clear, but the question is how? Research will help us answer this question."
 CZE_fortification_research_tt: "Has national spirit §Y$CZE_directorate_of_fortification_works_no_gd_idea$§!"
 CZE_fortification_research_subtract_variable_tt: "All future §YFortification Programs§! Decisions will take §Y30§! less day(s) to §YComplete§!"
 CZE_fortification_decision_inprogress: "Already working on another fortification program"
 CZE_second_sudetenland_fortification_program: "Second Sudetenland Fortification Program"
 CZE_second_sudetenland_fortification_program_desc: "The Sudetenland, our mountainous border with Germany, is the perfect place for border fortifications. Having studied the French Maginot line, we can build a similar line of our own."
 CZE_third_sudetenland_fortification_program: "Third Sudetenland Fortification Program"
 CZE_third_sudetenland_fortification_program_desc: "The Sudetenland now boasts a decent defensive line, but decent is not good enough when our national survival is at stake."
 CZE_fourth_sudetenland_fortification_program: "Fourth Sudetenland Fortification Program"
 CZE_fourth_sudetenland_fortification_program_desc: "The Sudetenland has a strong system of fortifications, but they must be stronger still."
 CZE_fortify_the_crossroads_with_slo: "Fortify the Crossroads"
 CZE_fortify_the_crossroads_with_slo_desc: "Any system of fortifications may be broken. To guard against this eventuality we can construct strong points around our most important cities so that they cannot easily be seized by an enemy who breaks through our lines."
 CZE_fortify_the_hungarian_border_with_73: "Fortify the Hungarian Border"
 CZE_fortify_the_hungarian_border_with_73_desc: "Hungarian irredentism is a constant threat to our nation, a system of fortifications along our mutual border will help to ensure our safety."
 CZE_fortify_the_polish_border_with_72: "Fortify the Polish Border"
 CZE_fortify_the_polish_border_with_72_desc: "Polish aggression knows no bounds, but hopefully a well-fortified border will cause them to look for an easier target."

