l_english:

#Shortcuts 
CZE_military_path_shortcut: "Armed Forces"
CZE_economic_path_shortcut: "Economy"
CZE_diplomacy_path_shortcut: "Diplomacy"
CZE_fort_path_shortcut: "Fortification Efforts"
CZE_skoda_priority_shortcut_name: "Škoda Priority"
CZE_political_path_shortcut: "Politics"

# Č does show when scrolling through focuses, but not in the detailed focus view title (does work in the description though)

CZE_coalition_building: "Coalition Building"
CZE_coalition_building_desc: "The coalition that emerged in the aftermath of the elections must build greater unity among its members if it is to function effectively. Jan Malypetr's recent retirement as prime minister has placed further pressure on the Broad Coalition to consolidate its support."
CZE_merge_the_paramilitaries: "Merge the Paramilitary Groups"
CZE_merge_the_paramilitaries_desc: "Our paramilitaries are spread out and split across many different groups. If we hope to make use of them militarily, we will have to force them to merge."
CZE_integrated_paramilitaries: "Integrate Paramilitaries"
CZE_integrated_paramilitaries_desc: "The military might not be too pleased with the idea, but integrating the paramilitary groups into our military will give us an increased pool of reserves when we need them the most."
CZE_wielding_the_hammer: "Wielding the Hammer"
CZE_wielding_the_hammer_desc: "We can use our supermajority in the National Assembly to make the law-passing process much faster than it currently is. It's of the utmost importance to get our legislative house in order."
CZE_emergency_measures: "Emergency Measures"
CZE_emergency_measures_desc: "By deploying emergency measures to help us deal with the many crises our nation faces, and at the same time using some of those measures to help keep a closer eye on those who may be ideologically unreliable to our government. We will be better equipped to face the challenges our nation faces."
CZE_king_of_the_castle: "King of the Castle"
CZE_king_of_the_castle_desc: "We all know who's calling the shots in our government. In a time of great uncertainty, it's time we stop pretending and let $CZE_edvard_benesh$ lead more directly. Our country's security depends on it."
CZE_closer_ties_with_the_moderate_germany_parties: "Rally Moderate Sudetenland Parties"
CZE_closer_ties_with_the_moderate_germany_parties_desc: "Some Sudetenland parties are willing to work with our coalition and build inroads with the government. Let's deepen those ties."
CZE_complete_reconciliation: "Complete Reconciliation"
CZE_complete_reconciliation_desc: "We've put in the work to build the bridges of trust. It's time to reconcile with our fellow countrymen."
CZE_complete_reconciliation_cooldown_flag: "Has completed focus §Y$CZE_closer_ties_with_the_moderate_germany_parties$§!"
CZE_complete_reconciliation_cooldown_flag_tt: "Current days are: [?CZE_complete_reconciliation_cooldown_flag:days|Y0]"
CZE_bastion_of_liberty: "Bastion of Liberty"
CZE_bastion_of_liberty_desc: "We have been one of the few truly pluralist countries in Europe east of the Rhine this decade. Let's ensure people don't forget that."
CZE_standing_against_the_storm: "Standing Against the Storm"
CZE_standing_against_the_storm_desc: "Despite our shortcomings and possible lack of preparation, we will meet any challenge head-on and stand against the coming storm."
CZE_truth_prevails: "Truth Prevails"
CZE_truth_prevails_desc: "Even in the face of great odds and impossible tasks, our country knows that our national motto, 'Truth Prevails,' will ring true when all is said and done. Seek the truth, speak the truth, and it will prevail."
CZE_negotiations_with_the_autonomous_bloc: "Negotiations with the Autonomous Bloc"
CZE_negotiations_with_the_autonomous_bloc_desc: "If we want to form a coalition that doesn't concede power to Benes's legion of lackeys in the National Assembly, we'll have to work with the Autonomous Bloc. However, gaining their complete support will come at great cost."
CZE_slovakia_autonomy_agreement: "Slovakia Autonomy Agreement"
CZE_slovakia_autonomy_agreement_desc: "The price for the autonomous bloc's working with our coalition is an autonomy agreement with the government. This is a heavy price to pay, but the consequences of not living up to our end of the bargain could be worse."
CZE_slovakia_autonomy_agreement_tt: "§Y[RUT.getname]§! will want the same agreement we give §Y[SLO.getname]§!!"
CZE_slovakia_autonomy_agreement_2_tt: "$CZE_the_autonomous_bloc_demands$ will be delayed by §Y35 days§! when this focus is selected."
CZE_topple_the_king: "Topple the King"
CZE_topple_the_king_desc: "$CZE_edvard_benesh$ influence on our government is suffocating. His power is greater than his role as president due to his legion of loyalists within parliament. Now that the conditions are right, we can supplant his influence in the Horní Komora."
CZE_comprise_with_the_carpathians: "Compromise with the Carpathians"
CZE_comprise_with_the_carpathians_desc: "The region of Ruthenia is striving toward a similar federalization agreement to the one we gave [SLO.getnamedef]. Doing so would greatly weaken our position in the region and in [9.getname]. Cutting a deal with them may be better than totally giving in to their demands."
CZE_the_rut_demands_add_35_CZE_comprise_with_the_carpathians_tt: "$CZE_the_rut_demands$ will be delayed by §Y35 days§! when this focus is selected."
CZE_cut_carpathia_loose: "Cut Carpathia Loose"
CZE_cut_carpathia_loose_desc: "With Slovakia now a federal state, the region of Ruthenia is hoping to make a similar agreement. While this seems unreasonable, without Slovakia under our direct control trying to reign them in would be difficult. Maybe we should just give in to their demands."
CZE_compromise_with_the_veteran_agrarian: "Compromise with the Veteran Agrarians"
CZE_compromise_with_the_veteran_agrarian_desc: "The agrarian old guard is a hurdle in making inroads with the growing urban electorate. We need to compromise with them to achieve our goals."
CZE_reorient_the_broad_coalition: "Reorient the Broad Coalition"
CZE_reorient_the_broad_coalition_desc: "The broad coalition has been the leading bloc in our government for many years. The various political parties it encompasses have made the coalition increasingly difficult to lead. A reorientation of ministerial policies is long overdue."
CZE_leverage_sokol: "Leverage Sokol"
CZE_leverage_sokol_desc: "The Sokol movement has been an important organization within our country for decades. In times of crisis, we should leverage them to help provide paramilitary training and recruits for our army."
CZE_urbanist_policies: "Urbanist Policies"
CZE_deepend_ties_with_the_trademans: "Deepen Ties with the Tradesmen"
CZE_deepend_ties_with_the_trademans_desc: "The Tradesmen Party is popular among middle-class urban voters. If we empower and work with them we can make inroads with the urban electorate while not alienating our rural voter base."
CZE_apart_but_togather: "Apart but Together"
CZE_apart_but_togather_desc: "Our regions now have more autonomy than they ever had, but we are also stronger than we've ever been. We are ready to take on anything."
CZE_contact_henlein: "Contact Henlein"
CZE_contact_henlein_desc: "$CZE_konrad_henlein$ has been a constant thorn in the side of our government for years now. However, in light of recent international events, it may be time to start a dialogue with him."
CZE_contact_henlein_cooldown_flag: "Has completed focus §Y$CZE_no_compromise_with_the_sdp$§!"
CZE_contact_henlein_cooldown_flag_tt: "Current days are: [?CZE_contact_henlein_cooldown_flag:days|Y0]"
CZE_contact_henlein_focus_warning_tt: "If we complete §Y$CZE_no_compromise_with_the_sdp$§!, we'll have to wait §Y350§! days before we may select this §YNational Focus§!."
CZE_contact_henlein_focus_order_warning_tt: "If we complete §Y$CZE_no_compromise_with_the_sdp$§! after completing this §YNational Focus§!, §Y$CZE_konrad_henlein$§! will be retired."
CZE_no_compromise_with_the_sdp: "Continue to Lock Out the SdP"
CZE_no_compromise_with_the_sdp_desc: "The SdP has nothing to offer our coalition. They seek only to cause political tension and to smear our government's actions. In the name of good governance, they should continue to be locked out of any coalition. "
CZE_no_compromise_with_the_sdp_cooldown_flag: "Has completed focus §Y$CZE_contact_henlein$§!"
CZE_no_compromise_with_the_sdp_cooldown_flag_tt: "Current days are: [?CZE_no_compromise_with_the_sdp_cooldown_flag:days|Y0]"
CZE_no_compromise_with_the_sdp_focus_warning_tt: "If we complete §Y$CZE_contact_henlein$§!, we'll have to wait §Y350§! days before we may select this §YNational Focus§!."
# CZE_economic_integration: "Economic Integration"
# CZE_economic_integration_desc: "Why stop at a customs union? Economic integration will further grow our economies and ensure our future is an affluent one for all members."
CZE_form_a_federation: "Forming a Federation"
CZE_form_a_federation_desc: "The dream of a central European federation is no longer out of reach. We will finally achieve it and become a giant of democracy. Together, we will have the power to resist the great powers on our own!"
CZE_reassure_the_army: "Reassure the Army"
CZE_reassure_the_army_desc: "The army is getting nervous about some of our recent decisions and government policies. It's time to reassure them that we stand by them no matter what the government says or does."
CZE_outreach_to_the_western_powers: "Further Outreach to the Western Powers"
CZE_outreach_to_the_western_powers_desc: "The Western democracies say they have our back, but we need to make further inroads with them to make sure that their words will also come with actions when it matters most."
CZE_demand_guarantees: "Demand Stronger Guarantees"
CZE_demand_guarantees_desc: "Despite our existing treaties and alliances, we need to make sure our partners do not abandon us in a time of desperation just because it's easier for them. We need something stronger than a guarantee."
CZE_guardian_of_central_europe: "Guardian of Central Europe"
CZE_guardian_of_central_europe_desc: "We now stand in a position to be an overseer of Democracy in the center of Europe. We can be a guardian for nations who cannot fend for themselves and make sure that democracy stands tall."
CZE_central_european_faction: "Overlord of Central Europe"
CZE_central_european_faction_desc: "Despite our focus on strengthening ourselves instead of relying too heavily on diplomacy, it is critical that we do not overextend our influence. It may be time to look outwards."
CZE_strike_at_the_heart_of_bolshevism: "[THIS.GetAntiSovietFocusName]"
CZE_strike_at_the_heart_of_bolshevism_1: "Strike at the Heart of Bolshevism"
CZE_strike_at_the_heart_of_bolshevism_2: "Secure the Eastern Flank"
CZE_strike_at_the_heart_of_bolshevism_desc: "Expansion of [SOV.GetNameDef] is an existential threat to Europe and to our nation. We need to be a bulwark against them."
CZE_destroy_the_fascist_threats: "Destroy the Fascist Threats"
CZE_destroy_the_fascist_threats_desc: "[CZE_get_fascist_threats_desc]"
CZE_destroy_the_fascist_threats_desc_enemy_ger: "We all know who the greatest threat to peace in Europe is. [GER.getnamedefCAP] needs to be stopped sooner rather than later. If no one else is willing, it might as well be by us."
CZE_destroy_the_fascist_threats_desc_backup: "For our security, it is of utmost importance that our neighboring countries do not follow expansionist rhetoric that might sooner or later be aimed towards us."
CZE_peace_on_our_time: "Peace for Our Time"
CZE_peace_on_our_time_desc: "We've been an afterthought in European international relations for too long. No longer will this be the case! We can stand on our own two feet and set our terms. Be it war or peace."
CZE_reach_out_for_military_assistance: "Reach Out for Military Assistance"
CZE_free_tuka: "Free $CZE_vojtech_tuka$"
CZE_free_tuka_desc: "$CZE_vojtech_tuka$ prison sentence is up and instead of finding an excuse to extend his sentence, we could instead free him on time and put him to use within our government. It's better to have him working under us rather than against us."
CZE_grow_the_anglo_czechoslovak_prague_credit_bank: "The Anglo-Czechoslovak Bank"
CZE_grow_the_anglo_czechoslovak_prague_credit_bank_desc: "The Anglo-Czech Credit Bank has been one of the primary drivers of our industry. Without their funds, we wouldn't be able to sustain the large export business we currently have. Establishing new branches in New York and deepening ties with [ENG.GetNameDef] would see the bank grow even further. It would also give [ENG.getname] some stake in our continued survival."
CZE_feeding_the_alligator: "Feeding the Crocodile"
CZE_feeding_the_alligator_desc: "[GER.getname] designs on the Sudetenland are a threat to the very existence of our nation. Perhaps if we give them what they desire they will leave us alone."
CZE_complete_capitulation: "Complete Capitulation"
CZE_complete_capitulation_desc: "What choice do we have but to give in? We cannot resist the coming storm on the horizon. Maybe if we cut a deal with [GER.getnamedef] while we still have some leverage they'll leave us with some independence under their yoke."
CZE_stabilize_the_protectorate: "Stabilize the Protectorate"
CZE_stabilize_the_protectorate_desc: "The Protectorate is anything but stable. We need to make efforts to convince our population that we are the legitimate government and that we will take care of their needs."
CZE_stabilize_the_protectorate_unretire_henlein_tt: "Unretires §Y$CZE_konrad_henlein$§! from §Y[ROOT.getname]§!."
CZE_full_faith_in_hacha: "Full Faith in Hacha"
CZE_full_faith_in_hacha_desc: "$CZE_emil_hacha$ is much more popular and respected within our population than $CZE_emanuel_moravec$. The job he's doing might be suspect, but you can't replace a more popular figurehead."
CZE_moravecs_bohemia: "Moravec's Bohemia"
CZE_moravecs_bohemia_desc: "Rumors are flying that $CZE_emil_hacha$ is trying to undermine our new government. Suppose we hope to succeed and grow under our current conditions, we need leadership that is more in line with the ideology of our overlords."
CZE_form_the_government_army: "Form the Government Army"
CZE_form_the_government_army_desc: "If we want our country to succeed, we need to form a new army that learns from the failings of its predecessor. We must also ensure its leadership is more politically aligned with the government."
CZE_forced_administration_of_companies: "Forced Administration of Companies"
CZE_forced_administration_of_companies_desc: "Despite massive oversight, some companies still operate outside of our control. It's time to force them under our supervision."
CZE_revisit_custom_union_talks: "Revisit Custom Union Talks"
CZE_revisit_custom_union_talks_desc: "Custom union talks may have gone very poorly with some of our neighbors compared to some others. It is time to revisit them and make a renewed push for a customs union between our countries."
CZE_revisit_custom_union_talks_tt: "We'll still be able to convince them to join, through other §Rmeans§!."
CZE_revisit_custom_union_talks_2_tt: "They will be much more likely to accept our demands to join us our Federation"
CZE_reintegrate_cross_border_rail_connections: "Improve Cross Border Rail Connections"
CZE_reintegrate_cross_border_rail_connections_desc: "Improving the rail connections with our neighbors is a good way to curry favor with them. More so if we're trying to grow economic connections between us and them."
CZE_reintegrate_cross_border_rail_connections_flag: "Cross Border Rail Connections Were Improved"
CZE_vonapo_20: "VONAPO 20"
CZE_vonapo_20_desc: "We are not alone in seeing the rising threat from [GER.GetNameDef], a plan has therefore been formed to cooperate with [SOV.GetNameDef] in gathering intelligence so we may better thwart [GER.GetAdjective] ambitions."
CZE_increase_funding_from_moscow: "Increase Funding from [SOV.capital.GetCapitalVictoryPointName]"
CZE_increase_funding_from_moscow_desc: "The [ROOT.GetCommunistParty] is so underfunded that it currently pays its building with the salaries of its representatives. To grow, we must appeal to [SOV.GetNameDef] for increased funding to spread our newspaper and recruit more members."
CZE_zdenek_fierlinger_tt: "Appoint advisor §Y$CZE_zdenek_fierlinger$§!"
CZE_expand_the_communist_press: "Expand the Communist Press"
CZE_expand_the_communist_press_desc: "Our newspaper, 'Red Law,' could serve to inform those that currently don't read any newspapers, all that's needed is an increase in funding."
CZE_anti_rearmament_propaganda:0 "Anti-Rearmament Propaganda"
CZE_anti_rearmament_propaganda_desc: "The fall of the fascist government of our main adversary, [GER.GetNonIdeologyName], means we can claim to have been right all along in our stance against military buildup."
CZE_anti_democratic_propaganda: "Anti-Democratic Propaganda"
CZE_anti_democratic_propaganda_desc: "To create support for our party, we must highlight the failings of the previous governments of the Republic and demonstrate how we could have handled the situation better."
CZE_form_workers_brigades: "Form Workers' Militia"
CZE_form_workers_brigades_desc: "The workers that we are freeing must be prepared to participate in the struggle. They may not be trained soldiers, but they can still contribute as specialists based on their jobs."
CZE_kohler_faction: "The Köhler Faction"
CZE_kohler_faction_desc: "The faction of Bruno Köhler believes a violent overthrow of the bourgeoisie is necessary to form a successful communist Czechoslovak state."
CZE_gottwald_faction: "The Gottwald Faction"
CZE_gottwald_faction_desc: "Loyal to a fault to Moscow, the Stalinist faction of Klement Gottwald foresees a Czechoslovak state in the USSR's image."
CZE_zapotocky_faction: "The Zápotocký Faction"
CZE_zapotocky_faction_desc: "The founders of the communist party, Bohumir Šmeral and Antonin Zápotocký, envisioned a more moderate policy than the one that Klement Gottwald has forced upon the party, we must return to these roots to truly appeal to all [CZE.GetAdjective] peoples."
CZE_ally_with_moderate_socialists:0 "Cooperate with Moderate Socialists"
CZE_ally_with_moderate_socialists_desc: "Not every country is prepared to embrace communism through electoral means or develop an admiration for [SOV.GetLeader], so cooperating with more moderate movements is something we should not avoid."
CZE_democracies_willing_to_join_faction_tt: "§YDemocratic nations will be more willing to join our communist faction§!."
CZE_limited_cooperation: "Limited Cooperation with [SOV.GetLeader]"
CZE_limited_cooperation_desc: "While ideologically different, even [SOV.GetNameDef] may recognize our value as a partner and take part in some pragmatic deals, even as they denounce us in their newspapers."
CZE_denounce_stalinism: "Denounce Stalinism"
CZE_denounce_stalinism_desc: "The reputation of communism is forever tainted by the injustices of Stalin, it is time we take military measures to free the people under regimes like his."
CZE_country_leader_has_ideology_stalinism_tt: "Country leader has ideology §Y$stalinism$§!"
CZE_cooperate_with_tito: "Cooperate with Tito"
CZE_cooperate_with_tito_desc: "[YUG.GetNameDefCap] is attempting a pragmatic version of communism, just like us. They similarly seek to unite various diverse peoples under the red banner. In facing these challenges, we should cooperate on military and political affairs."
CZE_reduce_divided_nation_cost_tt: "Reduces the cost and duration of most §YA Divided Nation§! decisions."
CZE_balkan_union: "Expand the Union"
CZE_balkan_union_desc: "Although more nations in the region now embrace communism, we cannot protect ourselves against the major powers without strong cooperation, a union would be the most effective way to achieve this."
CZE_cooperation_with_the_ussr:0 "Cooperation with [SOV.GetLeader]"
CZE_cooperation_with_the_ussr_desc: "Even the most ardent supporters of [SOV.GetNameDef] among the party leadership are aware of the flaws of its collectivization after visiting the country. Even then, cooperating with them in collectivization means we can carefully analyze what went wrong and what went right and how to implement it best for [ROOT.GetNameDef]."
CZE_exchange_military_expertise: "Exchange Military Expertise"
CZE_exchange_military_expertise_desc: "[SOV.GetNameDefCap], just like most powers with a significant army, has experimented with army tactics. We should request that they share their insights, and we in turn can share ours."
CZE_pressure_romania: "Pressure Romania"
CZE_pressure_romania_desc: "[ROM.GetNameDefCap] could pose a serious threat if it aligned with our enemies, possibly disrupting our connection with [SOV.GetNameDef] or providing valuable oil to our enemies. With [SOV.GetAdjective] backing, we pose enough of a threat to potentially align them without war."
CZE_facility_in_state_tt: "If there are no other §YExperimental Facilities§! in $STATE|Y$, we will gain §G1§! $FACILITY_TYPE|Y$ in $STATE|Y$."
CZE_spread_the_revolution: "Spread the Revolution"
CZE_spread_the_revolution_desc: "With the revolution successful in [ROOT.GetNameDef], we should now encourage the proletariat abroad to fight for their freedom, a struggle which we can support."
CZE_agrarian_reform: "Restore the Land Office"
CZE_agrarian_reform_desc: "The recently disbanded land office was responsible for the redistribution of mainly agricultural land, it is time we reform this institution for more drastic measures."
CZE_realign_the_church: "State Atheism"
CZE_realign_the_church_desc: "Religion has for too long been an element that divides the [CZE.GetAdjective] peoples. We must reduce its influence over state matters such as education and the news to create a more unified society."
CZE_create_a_secret_police_branch: "Create a Secret Police Branch"
CZE_create_a_secret_police_branch_desc: "To ensure stability, we must defend against both external and internal enemies. It will take time for the population to get used to the new system, especially as it is still being perfected."
CZE_promote_urbanization: "$ARG_promote_urbanization$"
CZE_promote_urbanization_desc: "Now we have established efficient communal farms, we can start programs to attract some of the rural populace to the cities and increase productivity there."
CZE_confiscate_church_lands: "Confiscate Church Lands"
CZE_confiscate_church_lands_desc: "The church controls far more land and wealth than necessary for its purposes. We must reallocate some of this land, just as we did for the farmers."
CZE_change_the_narrative:0 "Change the Narrative"
CZE_change_the_narrative_desc: "Although the church has not been supportive of our revolution so far, aligning its values with ours may play an important role in creating support for the new regime."
CZE_the_second_fortification_program: "Start the Second Fortification Program"
CZE_the_second_fortification_program_desc: "The first fortification program laid a foundation for defenses that we need to build upon immediately. For the sake of our nation's future, we need to start the second fortification program as soon as possible and grow and develop our fortification lines."
CZE_redirect_the_fortification_councils_funds: "Redirect Fortification Council Funds"
CZE_redirect_the_fortification_councils_funds_desc: "These fortification programs are a massive drain on our economy. Those funds would be better used for funding different programs. The army doesn't need more defenses anyhow, they have plenty."
CZE_jachymov_uranium_mine: "Reopen Jáchymov Uranium Mine"
CZE_jachymov_uranium_mine_desc: "The mines in Jáchymov have long served as a source for uranium and other ores, however there had been little use for uranium until recent developments in physics."
CZE_skoda_internal_competition: "Encourage Internal Competition"
CZE_skoda_internal_competition_desc: "Within a company as big as Škoda it is hard to keep everyone at peak working ability. Encouraging internal competition will go a long way in improving employee performance at our plants."
CZE_skoda_max_optimization_tt: "The maximum §YŠkoda Focus§! optimization level will be increased to 7."
CZE_skoda_increase_cooperation: "Increase Cooperation within Škoda"
CZE_skoda_increase_cooperation_desc: "To improve ourselves we can increase our performance by increasing cross-plant cooperation. This could also lead to expertise sharing between our plants."
CZE_skoda_fast_optimization_tt: " Rate §YŠkoda Focus§! £GFX_prod_eff_cap Optimization Tier increases over time toward Maximum Tier: §G+100.0%§!"
CZE_master_of_armaments: "Master of Armaments"
CZE_master_of_armaments_desc: "Škoda Works has been the largest arms manufacturer within our borders since the days of the Austria-Hungarian Empire. Their expertise and experience are unmatched among the industrial conglomerates in our country. It's time we elevate them to the title of Master of Armaments."
CZE_only_the_best_is_good_enough: "Only the Best is Good Enough"
CZE_only_the_best_is_good_enough_desc: "Škoda Works has always been driven by a hard work ethic and an innovative spirit. Our founders always abided by the motto: “Only the best is good enough for our customers!” That motto rings more true than ever in recent times."
CZE_an_industrial_legacy: "An Industrial Legacy"
CZE_an_industrial_legacy_desc: "Having developed our country’s industry to heights previously thought impossible, we can finally embrace and claim our industrial legacy. We are an unmatched powerhouse of industry."
CZE_powerhouse_of_europe: "Powerhouse of Europe"
CZE_powerhouse_of_europe_desc: "Our industry is now the envy of the world. We must now ensure our energy sector can supply it properly."
CZE_supply_fighters_for_allies: "Supply Fighters to Allies"
CZE_supply_fighters_for_allies_desc: "The [FRA.GetAdjective] and [ENG.GetAdjective] governments are very afraid that [GER.GetAdjective] planes would quickly defeat their defenses and target their cities if a conflict starts. Strengthening their airforce may therefore make them a little more confident about their ability to halt [GER.GetAdjective] expansion without significant loss of life."
CZE_allies_more_likely_to_defend_us_tt: "§YThe Allies will be more likely to back us against German expansionism regarding the Sudetenland.§!"
CZE_allies_more_likely_to_defend_us_2_tt: "§YThe Allies will be significantly more likely to back us against German expansionism regarding the Sudetenland.§!"
CZE_allies_more_likely_to_defend_us_3_tt: "§YThe Allies will be a tiny bit more likely to back us against German expansionism regarding the Sudetenland.§!"
CZE_establish_the_state_defense_guard: "Establish the State Defense Guard"
CZE_german_nonagressionpact: "Haushofer-Krofta Pact"
CZE_german_nonagressionpact_desc: "Negotiations for a non-aggression pact with [GER.GetNameDef] have been going on for a while. However, after signs of instability in [SOV.GetNameDef] and new expansionist plans, these stopped. With [GER.GetNameDef] currently occupied with other enemies, we must attempt to restart these talks."
CZE_revive_the_czechoslovak_legion_dynamic: "[CZE_revive_the_czechoslovak_legion]"
CZE_revive_the_czechoslovak_legion_default: "Revive the Czechoslovak Legion"
CZE_revive_the_czechoslovak_legion_communist: "Establish Volunteer Organization"
CZE_revive_the_czechoslovak_legion_dynamic_desc: "Once again there is unrest brewing in the world, and the brave soldiers of [ROOT.GetNameDef] are ready to defend the fatherland. But as the past has proven, defending the homeland sometimes requires that our troops fighting abroad must once again find those willing to leave their home, precisely to defend it."
CZE_revive_the_czechoslovak_legion_nsb_tt: "§Y$CZE_legacy_of_the_czechoslovak_legion_army_spirit$§! will be converted from a §YSpirit of The Army§! into a §YNational Spirit§!."
CZE_state_sponsored_recruitment_for_spain: "State-Sponsored Recruitment for Spain"
CZE_state_sponsored_recruitment_for_spain_desc: "With a new conflict where foreign intervention may play a crucial role, we should encourage the seasoned volunteer fighters of [ROOT.GetNameDef] to support the side that aligns most with our policies. We may even learn some lessons about warfare advances in the last decade in the process."
CZE_support_spain_reward_tt: "§YEffects if a Spanish faction has volunteers from us when it wins or loses:§!"
CZE_profit_off_the_spanish_civil_war: "Profit off the Spanish Civil War"
CZE_profit_off_the_spanish_civil_war_desc: "The Spanish Civil War is becoming a proxy war for the major powers. We should not  risk the lives of our brave troops getting entangled in such a conflict. Instead it is the perfect opportunity to fund a build-up of our industry by selling weapons, potentially even to both sides."
CZE_skoda_sell_weapons_to_SPR_tt: "Unlocks Decisions: §YCovertly Sell Weapons to Spanish Faction§!"
CZE_placate_benes_faction: "Give in to Benes Faction"
CZE_placate_benes_faction_desc: "$CZE_milan_hodza$ needs to come to terms with the fact that his stint as Foreign Affairs Minister has gone horribly. $CZE_edvard_benesh$ is ready to come in with his supporters within the Agrians and reinforce $CZE_milan_hodza$ position as Prime Minister as long as he gives up his Foreign Affairs position."
CZE_claim_lands_of_the_bohemian_crown: "Claim Lands of the Bohemian Crown"
CZE_claim_lands_of_the_bohemian_crown_desc: "Because our nation was part of the edge of various empires in the past centuries, our borders were shifted based on conflict, rather than the inhabitants' will, it is now time to correct those shifts."
CZE_demand_katowice: "Demand [762.GetName]"
CZE_demand_katowice_desc: "Gaining control over [762.GetName] would not just mean a restoration of our former borders, but would also weaken [POL.GetAdjective] claims on [72.GetName]."
CZE_fight_over_silesia: "Fight for Silesia"
CZE_fight_over_silesia_desc: "Silesia may be rightfully [ROOT.GetAdjective] land, but an all-out war with [66.owner.GetNameDef] is undesirable. We should therefore demonstrate our strength with large-scale border skirmishes rather than a large-scale war. If [66.owner.GetNameDef] is unwilling to fight in defense of Silesia, may yet deprive them of the territory."
CZE_dismantle_poland:0 "Dismantle [POL.GetNonIdeologyName]"
CZE_dismantle_poland_desc: "Its inability to defend itself now highlighted, it is clear that [POL.GetNameDef] cannot form a reliable buffer state against our enemies. Instead, we should move to strengthen our own state."
CZE_proclaim_the_restoration_of_bohemia: "Proclaim Restoration of the Bohemian Kingdom"
CZE_proclaim_the_restoration_of_bohemia_desc: "With our old borders restored, we can now reclaim our legacy and focus on integrating our new lands."
CZE_integrate_lost_territories: "Integrate Lost Territories"
CZE_integrate_lost_territories_desc: "The historic lands of the Bohemian Kingdom stretch from the Baltic Sea all the way to the Adriatic, it is now time to appeal to this history as we integrate our new possessions."
CZE_deepen_ties_with_puppet_kingdoms: "Deepen Ties with Puppet Kingdoms"
CZE_deepen_ties_with_puppet_kingdoms_desc: "Although we now possess a clear sphere of influence, we will need to make our influence even stronger to benefit the most from these aligned nations."
CZE_poland_alliance_monarchist: "Agreement with [POL.GetNonIdeologyName]"
CZE_poland_alliance_monarchist_desc: "$CZE_ally_poland_desc$"
CZE_a_strong_poland:0 "A Strong [POL.GetNonIdeologyName]"
CZE_a_strong_poland_desc: "Possessing one of the strongest armies of Eastern Europe, [POL.GetNameDef] has the potential to become a valuable ally."
CZE_mend_balkan_relations: "Mend Balkan Relations"
CZE_facilitate_a_strong_hungary: "Facilitate a Strong Hungary"
CZE_facilitate_a_strong_hungary_desc: "Since its independence, [HUN.GetNameDef] has had shaky relations with us. But with conflict brewing, we may be able to align them to our cause."
CZE_subjegate_romania: "Pressure Romania with [HUN.GetAdjective] Claims"
CZE_subjegate_romania_desc: "The claims of our [HUN.GetAdjective] puppet are a useful tool against [ROM.GetNameDef]. By threatening to let [HUN.GetNameDef] press its claims on [ROM.GetAdjective] territory and help them acquire it, we may be able to demand the alignment of [ROM.GetNameDef]."
CZE_demanded_overlordship_HUN: "Subjugated Hungary"
CZE_demanded_overlordship_ROM: "Subjugated Romania"
CZE_integrate_hungary: "Integrate Hungary"
CZE_integrate_hungary_desc: "Now we have established a significant sphere of influence, integration of the newly enlarged [HUN.GetName] could mean a restoration of the Austro-Hungarian borders, but under [ROOT.GetAdjective] leadership."
CZE_subjegate_serbia: "Subjugate [YUG.GetName]"
CZE_subjegate_serbia_desc: "The now weakened [YUG.GetName] no longer serves as an effective buffer state to defend our southern flank. After integrating Slovenia, we should now aim to expand even further."
CZE_strike_the_eastern_threat: "Strike the Eastern Threat"
CZE_strike_the_eastern_threat_desc: "The hypocritical [SOV.GetName], justifying its imperial ambitions by criticizing our government, forms an existential threat to [CZE.GetName] that must be eliminated."
CZE_assist_austria:0 "Protect [AUS.GetName]"
CZE_assist_austria_desc: "Keeping [AUS.GetNameDef] out of any conflicts is essential for our national security. The [AUS.GetAdjective] border is one of the most vulnerable points in our defenses. Their economy would also be a valuable asset for our enemies, something we cannot allow to happen."
CZE_return_to_democracy: "Return to Democracy"
CZE_return_to_democracy_desc: "With our home safeguarded, the population are increasingly aware that a military dictatorship is no longer productive. It is therefore time to hold elections and hand power back to a democratic civilian led administration."
CZE_cooperate_with_the_allies: "Cooperate with the Allies"
CZE_cooperate_with_the_allies_desc: "With greater stability in the region established, we should make an effort to restore ties with our traditional allies."
CZE_eliminate_austrian_defeatists:0 "Defeat [AUS.GetAdjective] Defeatists"
CZE_eliminate_austrian_defeatists_desc: "[AUS.GetNameDefCap] has given up the willingness to defend its state, we must intervene now before we find ourselves surrounded."
CZE_the_legacy_of_ottokar:0 "The Legacy of Ottokar"
CZE_the_legacy_of_ottokar_desc: "The legendary king Ottokar II expanded the Bohemian realm into Austria and to the Adriatic through the approval of the Austrian nobles. We must once again appeal to the Austrians, noble and unennobled alike."
CZE_demand_the_istrian_peninsula: "Demand the Istrian Peninsula"
CZE_demand_the_istrian_peninsula_desc: "[ROOT.GetNameDefCap] being landlocked has been an obstacle to our trade and influence for too long. We can no longer accept our economy being at the mercy of neighboring countries and should demand access to the Adriatic."
CZE_demand_slovenia: "Demand Slovenia"
CZE_demand_slovenia_desc: "Slovenia was in the past a notable part of the Austrian Empire, and now that we have assumed control over the core of that empire, we must seek to reclaim their territory once more."
CZE_demand_overlordship_of_yugoslav_league: "Demand Overlordship of the [YUG.GetAdjective] League"
CZE_demand_overlordship_of_yugoslav_league_desc: "While we know as well as [YUG.GetName] that local autonomy is sometimes required in a multi-ethnic nation, their alliance is now too weak to defend itself. We must appeal to [YUG.GetNameDef] to recognize this and allow us to intervene."
CZE_expand_the_rome_protocols: "Expand the Rome Protocols"
CZE_expand_the_rome_protocols_desc: "Our new government aligns much more with the one in [ITA.capital.GetCapitalVictoryPointName] than  [GER.capital.GetCapitalVictoryPointName].With disagreements between the two over Austria, joining the Rome Protocols may give [ITA.GetNameDef] the confidence it needs to stay on its current course instead of turning to [GER.GetNameDef]."
CZE_prague_protocols: "Prague Protocols"
CZE_soviet_alliance: "Expand the 1935 Treaty of Alliance"
CZE_soviet_alliance_desc: "The current alliance treaty with [SOV.GetNameDef] is far too ambiguous to be sure of their intervention if we come under attack.We must therefore approach them for a new agreement if we wish to guarantee our security."
CZE_airlift_soviet_support: "Airlift Soviet Support"
CZE_airlift_soviet_support_desc: "The lack of borders with our [SOV.GetAdjective] ally has led to the novel idea of flying in [SOV.GetAdjective] troops. A transport operation of such scope has never happened before but would mean that [SOV.GetAdjective] troops wouldn't have to enter the territory of our neighbors, at least on land."
CZE_unlocks_volunteer_transport_raid_tt: "Unlocks §YRaid§!:\nAir Bridge For Soviet Volunteers on §Y[73.GetName]§!"
CZE_intervene_in_the_ussr: "Intervene in the [SOV.GetAdjective] Civil War"
CZE_intervene_in_the_ussr_desc: "Once again there is unrest in [SOV.GetNameDef], and although the old royal family we once supported won't be returning, the possibility of a more friendly government cannot be ignored."
CZE_forgive_trading_debts: "Forgive Trade Debts"
CZE_forgive_trading_debts_desc: "Economic instability and the Great Depression have saddled some of our potential allies with debt to us that they struggle to repay which is straining relations. The government could forgive those debts and compensate our domestic companies impacted by this move."
CZE_improve_balkan_trade_relations: "Improve Balkan Trade Relations"
CZE_improve_balkan_trade_relations_desc: "Our greatest asset in winning over potential Balkan allies is our economy, we should show our willingness to spend resources on improving the economic situation of our potential allies."
CZE_ally_austria: "Ally [AUS.GetName]"
CZE_ally_austria_desc: "Its government nearly overthrown by Nazi thugs just a few years ago, [AUS.GetNameDef] should begin to realize the potential benefits of cooperating with [ROOT.GetNameDef]."
CZE_demand_the_czech_corridor: "Demand the Czech Corridor"
CZE_demand_the_czech_corridor_desc: "As we build the Little Entente into a proper alliance, it becomes increasingly obvious that redeploying troops to our allies, or receiving theirs, could prove very difficult in the event of a conflict. Having a strip of territory connecting our nation and [YUG.GetNameDef] like once proposed after the Great War could improve our safety and would safeguard our trade."
CZE_ally_hungary: "Ally [HUN.GetName]"
CZE_ally_hungary_desc: "Despite the conflicts that have plagued our relations with [HUN.GetNonIdeologyName] since the birth of [CZE.GetNonIdeologyName], they have recently shown potential in becoming a valuable ally."
CZE_ally_yugoslavia: "Ally [YUG.GetName]"
CZE_ally_yugoslavia_desc: "[YUG.GetNameDefCap] may have struggled with its economy in recent times, but their strategic resources and location cannot be overlooked."
CZE_protect_neutrality: "Protect Neutrality"
CZE_protect_neutrality_desc: "The Great War made clear that trying to stay neutral is futile when in the enemy's crosshairs. Protecting these nations means forcing our enemies into a two-front war when expanding instead of allowing them to divide and conquer."
CZE_if_cooperate_with_moderate_socialists_completed_tt: "Effects if §YCooperate with Moderate Socialists§! has been completed:"
CZE_mutual_protection_agreement_with_switzerland: "Protection Agreement with [SWI.GetNonIdeologyName]"
CZE_mutual_protection_agreement_with_switzerland_desc: "Both we and [SWI.GetNameDef] are working towards a situation where an invasion of our lands is impossible without unaffordable losses, by cooperating, we could field an army with the numbers to not just defend, but to counterattack decisively."
CZE_exchange_technology: "Cooperate on Research"
CZE_exchange_technology_desc: "Despite an abundance of natural resources, the Balkans lack the profitable colonies or advanced industry of the major powers. Therefore it is key that we cooperate on research to allow a focus on our respective specialties."
CZE_demand_corridor_to_ussr: "Demand a Corridor to the [SOV.GetAdjective]s"
CZE_demand_corridor_to_ussr_desc: "If [POL.GetNameDef] will not cooperate with us, we must take more serious action to ensure access to our [SOV.GetName] allies."
CZE_ally_poland:0 "Ally [POL.GetName]"
CZE_ally_poland_desc: "With the Polish-Soviet War still in memory and a rising threat to their west, [POL.GetNameDef] finds itself in a similar search for security as us. We must convince the [POL.GetAdjective] that neutrality won't save them, and to cast their lot with us."
CZE_realize_the_polish_czechoslovak_confederation: "Realize a Confederation"
CZE_realize_the_polish_czechoslovak_confederation_desc: "Despite their valiant fight, [POL.GetNameDef] has been defeated.With their government now in exile, ideas have emerged of a union with us. With their government merged with ours, we could rally the [POL.GetAdjective] to this new state and make a coordinated effort to liberate our collective homeland."
CZE_integrate_western_ukrainians:0 "Integrate Western Ukrainians"
CZE_integrate_western_ukrainians_desc: "The Ukrainians of [CZE.GetNameDef] has been offered a great deal of assistance and autonomy, we can now attempt to integrate the newly acquired lands into our Ukrainian province."
CZE_ally_russia:0 "Ally [SOV.GetNonIdeologyName]"
CZE_ally_russia_desc: "Now the government of [SOV.GetNameDef] aligns more closely with ours, we could try to expand upon the vague agreement signed with their previous government."
CZE_claim_ukraine:0 "Establish Friendly Ukrainian Government"
CZE_claim_ukraine_desc: "Ukraine is an important piece of [SOV.GetNameDef], by seizing it, we could form a powerful buffer state."
CZE_strengthen_the_little_entente:0 "Formalize the Little Entente"
CZE_strengthen_the_little_entente_desc: "Mainly aimed at containing [HUN.GetNonIdeologyName], the Little Entente has the potential to become a serious alliance with a sizable army."
CZE_seek_french_leadership:0 "Seek [FRA.GetAdjective] Leadership"
CZE_seek_french_leadership_desc: "Despite our initiative with forming this alliance, it is clear [FRA.GetNonIdeologyName]'s army would be a great addition to any alliance. Even if it means ceding leadership."
CZE_increase_food_and_resource_imports:0 "Increase Food and Resource Imports"
CZE_increase_food_and_resource_imports_desc: "With our new allies having a strong agricultural industry, it is now less necessary to subsidize one of our own. Importing resources cheaply will both save us money and give our allies a boost to their economy."
CZE_double_down_on_heavy_industry:0 "Double Down on Heavy Industry"
CZE_double_down_on_heavy_industry_desc: "The new agreements with our allies will allow us to focus on the industries that are most competitive, like our weapons industry. Any excess can then be sold."
CZE_neutralize_the_hungarian_threat:0 "Neutralize [HUN.GetAdjective] Threat"
CZE_neutralize_the_hungarian_threat_desc: "[HUN.GetNameDefCap] is an obstacle to trade with potential allies to the south, and if aligned with our enemies, could keep a potentially vital part of our army busy despite the impact of the Treaty of Trianon."
CZE_cancel_anti_hungary_focus: "Backed down after [GER.GetAdjective] intervention"
CZE_ally_romania:0 "Ally [ROM.GetName]"
CZE_ally_romania_desc: "[ROM.GetNameDefCap] is uniquely one of the more self-sufficient nations in the region, producing food and valuable oil. Aligning them would not only give us easier access to each other's resources but would also deny our enemies the raw materials they need to wage war against us."
CZE_divide_germany:0 "Divide Germany"
CZE_divide_germany_desc: "The threat from [GER.GetNameDef] is hard to counter alone, we should therefore seek allies who are similarly worried about [GER.GetAdjective] expansion, and have the willpower to act preemptively."
CZE_if_FRA_ally_tt: "Effects if §YFrance is monarchist§! and not already aligned with anyone else:"
CZE_if_POL_ally_tt: "Effects if §YA Strong Poland§! was completed and resulted in a guarantee from [POL.GetNonIdeologyName]:"
CZE_revolutionary_brigades:0 "Found Revolutionary Brigades"
CZE_revolutionary_brigades_desc: "Our revolutionaries that now have experience fighting for [ROOT.GetNameDef] should be further integrated into the regular army."
CZE_recruit_communist_exiles: "Recruit Communist Exiles"
CZE_recruit_communist_exiles_desc: "[ROOT.capital.GetCapitalVictoryPointName] has long been a safe haven for exiled revolutionaries, our new government could make use of these foreign radicals."
CZE_destabilize_potential_adversaries: "De-Stabilize Potential Adversaries"
CZE_destabilize_potential_adversaries_desc: "The exiled communists we work with have an understanding of their home country that even our spies can struggle to match, we must make full use of this knowledge when deciding a strategy to liberate their homeland."
CZE_nationalize_key_industries:0 "Nationalize the Banks and Mines"
CZE_nationalize_key_industries_desc: "The mines provide the raw material that our industry forges into the weapons of war. Ensuring that supply of material in a time of crisis is best left in the hands of the government, rather than those of financiers and industrialists."
CZE_rehabilitate_the_army: "Rehabilitate the Army"
CZE_rehabilitate_the_army_desc: "Most generals of the [CZE.GetAdjective] army are veterans of the Czechoslovak Legion, which most prominently fought against the Soviets in their civil war. It will be necessary to ensure their loyalty to the new [CZE.GetAdjective] government."
CZE_unlock_civil_war_army_generals_tt: "Regain Commanders Lost in the Civil War"
CZE_recruit_ideologically_aligned_generals: "Recruit Ideologically Reliable Generals"
CZE_recruit_ideologically_aligned_generals_desc: "It is time to adjust our training programs to enrich the army with new candidates that understand our new values."
CZE_recruit_communist_generic_general_tt: "Gains a communist general."
CZE_purge_two_random_commanders_tt: "Two random commanders will be purged."
CZE_czechoslovak_union: "Czechoslovak Union"
CZE_czechoslovak_union_desc: "Local autonomy must be increased in [CZE.GetNameDef], this will allow for the communist system to be adjusted to the local circumstances."
CZE_continue_industrial_relocation_schemes: "Continue Armory Relocation Schemes"
CZE_continue_industrial_relocation_schemes_desc: "For the sake of our national security, we must continue to relocate our more vulnerable factories to areas where they will be better protected from aerial and ground attacks. We cannot risk such a critical industry being put in harm's way."
CZE_continue_industrial_relocation_schemes_tt: "Remove §Y1 Military Factory§!."
CZE_continue_industrial_relocation_schemes_2_tt: "§RThe factories will need to be rebuilt.§!"
CZE_establish_a_armament_factory_in_uhersky_brod: "Found the Uhersky Brod Armament Factory"
CZE_establish_a_armament_factory_in_uhersky_brod_desc: "The Uhersky Brod Factory is an armament factory that specializes in making and designing automatic weapons for infantry and aircraft. We plan on making it the most advanced factory of its kind in the world."
CZE_appeal_to_the_castle: "Appeal to the Castle"
CZE_appeal_to_the_castle_desc: "The 'Castle' in Czechoslovakia refers to the extensive network of influential organizations and people that support its presidents. This power in turn allows the presidents to exert more influence than their limited constitutional duties would suggest. Appealing for support from this group would give an incredible boost to our bid for leadership."
CZE_petition_the_nobles: "Petition the Nobles"
CZE_petition_the_nobles_desc: "The noble class of [ROOT.GetNameDef] may no longer have recognized titles, but it is still an influential part of [ROOT.GetAdjective] society, their support would give us both the legitimacy and resources needed to gather further support."
CZE_unify_the_fascist_parties: "Unify the Fascist Parties"
CZE_unify_the_fascist_parties_desc: "The landscape of fascist parties is fractured, with many of them so extreme that they can never hope to gain significant support. In defense of the nation, it is necessary that these parties unify and create a vision of Czechoslovakia that appeals not just to the fringe elements of society."
CZE_pro_rearmament_propaganda: "Pro-Rearmament Propaganda"
CZE_pro_rearmament_propaganda_desc: "To increase support for a more centralized government, we must highlight the currently fragile situation in the world around us. This will also help motivate the populace to support plans to strengthen the army when necessary."
CZE_align_nationalist_parties: "Align Czech Nationalist Parties"
CZE_align_nationalist_parties_desc: "Although we should try to appeal to all [ROOT.GetAdjective]s, there is no denying that the traditional Czech nationalist parties are the most influential on the political scene, and it is with them that we can most easily gather support."
CZE_align_slovak_catholics: "Align Slovak Catholics"
CZE_align_slovak_catholics_desc: "Catholic and nationalist parties currently have a lot of support in Slovakia. Although appealing to the nationalists would be difficult without serious concessions, we may be able to rally the Catholic elements to our cause."
CZE_jozef_tiso_tt: "Appoint advisor §Y$CZE_jozef_tiso$§!"
CZE_align_catholic_parties: "Align the CSL"
CZE_align_catholic_parties_desc: "The ČSL and other catholic parties were the traditional support base for the monarchist system in the Austro-Hungarian empire, it is time that we try to sway them back to this position."
CZE_restore_the_monarchy: "Restore the Monarchy"
CZE_restore_the_monarchy_desc: "With support for a new system established, it is time we propose the refined idea to the people. With $CZE_karel_schwarzenberg$ as chosen monarch, we appeal both to the old supporters of the monarchy, and new ones since the he is [ROOT.GetAdjective], not an [AUS.GetAdjective] monarch as previously imposed on us."
CZE_semi_constitutional_monarchy: "A Semi-Constitutional System"
CZE_semi_constitutional_monarchy_desc: "With a monarch now elected, it is time to adjust the constitution, while some advocate for centralizing power to avoid infighting in these troubled times, it is clear that the monarch can't do everything on his own. Therefore it may be best to partly keep the current system to assist in running the country, while also having the monarch there to guide the country."
CZE_restore_noble_titles: "Restore Noble Titles"
CZE_restore_noble_titles_desc: "Previously disbanded when the republic was founded, it is time to reward the nobility's cooperation by restoring their titles. This will also allow us to bestow honorary titles on heroes such as veteran officers that fought again and again for the [ROOT.GetAdjective] state."
CZE_restore_the_austro_hungarian_customs_union: "Restore the Empire's Customs Union"
CZE_restore_the_austro_hungarian_customs_union_desc: "One of the undeniable advantages of the Austro-Hungarian empire was the limited trade barriers for our industry, bringing this union back would be the first step to bring the other former constituent countries into our sphere."
CZE_customs_union: "Customs Union"
CZE_catholic_focus:0 "Catholic Focus"
CZE_catholic_focus_desc: "Despite the Hussites being a famous part of [ROOT.GetAdjective] history, many still have Catholic beliefs that we should appeal to by increasing their role in society."
CZE_hussite_legacy:0 "Hussite Legacy"
CZE_hussite_legacy_desc: "The Hussites did not just promote a more Protestant style of Christianity, they also stood out for their tolerance of other opinions on the matter, unlike the tyrants who fought wars to oppose them."
CZE_align_with_germany:0 "Align with [GER.GetNonIdeologyName]"
CZE_align_with_germany_desc: "The new government in [GER.GetNameDef] may not necessarily be less expansionist, but they may prove more willing to be pragmatic in who they form alliances with and who they denounce. We should make an effort to be in the former group."
CZE_rally_against_germany: "Rally Against [GER.GetNonIdeologyName]"
CZE_rally_against_germany_desc: "Czechoslovakians fought bravely for their independence, and we must now appeal to all people to protect this independence."
CZE_integrate_sudeten_germans:0 "Integrate Sudetenland"
CZE_integrate_sudeten_germans_desc: "Division among the population of the Sudetenland is helping no one. We must aim to address their concerns and work on tackling them. That alone may disarm any independence figures, as their claims of mistreatment would be hard to believe."
CZE_cooperate_with_the_sdp:0 "Cooperate with the SdP"
CZE_cooperate_with_the_sdp_desc: "Although a destabilizing force, the SdP may fall in line if properly encouraged, like with inclusion in the ruling coalition."
CZE_revive_the_december_bloc:0 "Revive the December Bloc"
CZE_revive_the_december_bloc_desc: "The December bloc of fascist, minority, and right-wing parties that opposed Edvard Benes becoming president should be restored to offer an alternative to the current government."
CZE_revert_1926_anti_military_laws:0 "Revert the 1927 Anti-Military Laws"
CZE_revert_1926_anti_military_laws_desc: "After a coup attempt by $CZE_radola_gajda$, the army and gendarmerie lost their right to vote, as well as certain other privileges. Given the army's crucial position in these trying times, it is only fair that we remove these restrictions and undo the divide between the army and politics."
CZE_bop_to_fascism_support_tt: "Add a third of the §Y$CZE_bop_army_readiness$§! value to fascism support:"
CZE_power_to_the_military: "Power to the Military"
CZE_power_to_the_military_desc: "It is clear that no resources can be spared in defense of the nation. This makes it critical that those  in power understand the needs of the army, and there is no better way to ensure that than through a military government."
CZE_militarize_the_associations: "Militarize the Associations"
CZE_militarize_the_associations_desc: "The many associations of [CZE.GetNameDef] could contribute to the nation's defense by teaching skills that are essential for a soldier, even before the populace is mobilized."
CZE_aggressive_foreign_policy:0 "Aggressive Foreign Policy"
CZE_aggressive_foreign_policy_desc: "The time of trusting fragile pacts is over, we must act decisively to safeguard our security, even if it takes serious sacrifices."
CZE_work_with_germany: "Work with [GER.GetNameDef]"
CZE_work_with_germany_desc: "With the Sudeten question settled, perhaps [GER.GetNameDef] could now recognize how valuable [ROOT.GetNameDef] would be as an ally."
CZE_control_the_associations:0 "Control the Associations"
CZE_control_the_associations_desc: "[CZE.GetNonIdeologyName] has many organizations, from people sharing the same job, to free time interests or sports associations, control these and you control much of society."
CZE_diversify_bata: "Diversify Bat'a"
CZE_diversify_bata_desc: "Bat'a is a large consumer company that we could use to our benefit in our resource supply chain. They can help us by providing critical materials that are hard to come by otherwise."
CZE_devaluate_the_koruna: "Devalue the Koruna"
CZE_devaluate_the_koruna_desc: "Having a strong currency is a dangerous economic position to be in as a country that relies on exports for a good portion of its economy. Weakening our currency may lead to short-term pain, but in the long run, we'll be better off having done so."
CZE_continue_the_central_bohemia_plan: "Continue the Central Bohemia Plan"
CZE_continue_the_central_bohemia_plan_desc: "Continuing our plan of expanding the industrial areas in the center of our country would allow us to take advantage of economies of scale. Expanding our industry in a place away from our borders would also be wise from a national security perspective."
CZE_balance_industrial_invevestments: "Balance out Industrial Development Efforts"
CZE_balance_industrial_invevestments_desc: "Leaving out areas outside of [9.getname] and [75.getname] underdeveloped is one of the reasons our country started to get divided at the beginning of the decade. Growing areas on our country's exterior would help bridge the gap in industrial development between the two areas."
CZE_expand_prf_science_facilities: "Expand PrF's Science Facilities"
CZE_expand_prf_science_facilities_desc: "Prf's science facilities are filled with an army of bright individuals waiting for an opportunity to do something bigger than they're doing right now. Expanding the department and having them work with the government is a good start to improving our research."
CZE_raise_more_industrial_funds: "Raise More Industrial Funds"
CZE_raise_more_industrial_funds_desc: "From the time of Austria-Hungary to the present day, industry has been the heart of our nation. By providing essential budget and funding, it will continue to thrive in this troubled Europe."
CZE_skoda_priority_focus_info_tt: "Some §YNational Focuses§! will require us to be on a specific £GFX_CZE_skoda_text_icon §YŠkoda Priority§! Focus to complete. These Focuses are indicated with an small icon related to the required £GFX_CZE_skoda_text_icon §YŠkoda Priority§!."
CZE_joint_stock_schemes: "Joint Stock Schemes"
CZE_joint_stock_schemes_desc: "Joint stock schemes have served as a source of economic growth when traditional funding sources were lacking. Continuing to leverage these tactics will lead to further growth in our economy."
CZE_the_slovak_arrow: "The Slovak Arrow"
CZE_the_slovak_arrow_desc: "Developing a fast railcar between two of our major cities would be a major source of national pride. It also would give us a good excuse to improve rail infrastructure."
CZE_finish_double_tracking_efforts: "Finish Double Tracking Efforts"
CZE_finish_double_tracking_efforts_desc: "Finishing efforts to double-track some of our important secondary rail lines will allow us to have greater traffic throughput on those lines. Leading to better connectivity between some of our secondary cities."
CZE_realize_motorway_proposals: "Realize Motorway Proposals"
CZE_realize_motorway_proposals_desc: "Some motorway proposals were presented to our government that would greatly improve the road connectivity within our borders. We should act upon these proposals and make them a reality."
CZE_build_additional_rail_stations: "Build Additional Rail Stations"
CZE_build_additional_rail_stations_desc: "With our newly developed rail infrastructure, some of our existing rail stations cannot handle the increase in throughput. Improving them would greatly help our ability to get people and goods out to where they need to be at greater volume."
CZE_build_additional_rail_stations_focus_cost_tt: "Taking §Y$CZE_devaluate_the_koruna$§! will reduce the time this focus takes down to §G35§! days."
CZE_grow_ckd_secondary_facilities: "Grow CKD's Secondary Facilities"
CZE_grow_ckd_secondary_facilities_desc: "CKD has a lot of smaller secondary plants that produce some important industrial products such as electrical generators. Expanding these plants would help the growth of our heavy industry."
CZE_bolster_domestic_construction: "Bolster Domestic Construction"
CZE_bolster_domestic_construction_desc: "Our domestic construction sector has been steadily growing since we became independent after the end of the Great War. Providing additional investments to some of the medium-sized construction contractors would further strengthen this growth."
CZE_invest_in_vhht: "Invest in VHHT"
CZE_invest_in_vhht_desc: "The VHHT is a company that includes many different metalworking plants throughout our country. Investing and expanding them will help us improve many different areas of our metal production down the line."
CZE_expand_vitkovice_ironworks: "Expand Vítkovické Ironworks"
CZE_expand_vitkovice_ironworks_desc: "The Vítkovické Ironworks is an important supplier of Iron within [74.getname]. Expanding it would greatly increase the output of the plant."
CZE_expand_central_bohemian_mines: "Expand Central Bohemian Mines"
CZE_expand_central_bohemian_mines_desc: "The mines in the center of our country are the most important to our energy security. We must expand them as soon as possible."
CZE_increase_bauxite_imports: "Increase Bauxite Imports"
CZE_increase_bauxite_imports_desc: "Our country might not be rich in aluminum, but by using certain refinery processes and increasing our imports of bauxite, we can produce a small amount of the resource here domestically. This would help relieve shortages of resources."
CZE_merge_the_oil_companies: "Merge the Oil Companies"
CZE_merge_the_oil_companies_desc: "Our oil companies can barely call themselves that. They are all smaller corporations that are built around a few wells. By merging them and bringing the oil industry under state control, we can achieve more with less"
CZE_expand_trinec_ironworks: "Expand Trinec Ironworks"
CZE_expand_trinec_ironworks_desc: "Trinec Steelworks has been a titan of industry in [72.getname] since its founding. Further investments would give us massive dividends in resource production."
CZE_consolidate_mining_operations: "Consolidate Mining Operations"
CZE_consolidate_mining_operations_desc: "Our mining operations could be better optimized if the administration of these companies were combined to be more efficient. This would allow their research and efforts to expand existing mines to be more efficient."
CZE_expand_praga: "Praga Contracts"
CZE_expand_praga_desc: "Praga has been a source of various components for our military industry for years now. It's logical to reward them with additional contracts to help them grow further."
CZE_shrink_educational_disparities: "Shrink Educational Disparities"
CZE_shrink_educational_disparities_desc: "Our rural areas have been lacking the proper education that is offered to their urban counterparts. We need to fight these disparities with major educational programs aimed at these areas."
CZE_kickstart_rapid_rearmanent: "Kickstart Rapid Rearmanent"
CZE_kickstart_rapid_rearmanent_desc: "Many politicians and businesspeople may see it as a terrible decision, but we need to start rearmament now. The countries around us are not disarming, in fact they are doing the opposite, and it's an open secret. We need to prepare our army while we still have time."
CZE_keep_focus_on_weapon_exports: "Keep the Focus on Weapon Exports"
CZE_keep_focus_on_weapon_exports_desc: "Our large weapon export industries are what got us out of our economic depression. Turning around that trend would be dangerous politically and economically. Staying the course is the best course of action at this time. Any threats to us are overblown anyway."
CZE_force_the_industrialists_hand: "Force The Industrialist's Hand"
CZE_force_the_industrialists_hand_desc: "The industrialists and conglomerates have held back our ability to rearm effectively for too long. It's time we chose for them, for the sake of the nation."
CZE_embrace_corporatism: "Embrace Corporatism"
CZE_embrace_corporatism_desc: "We could negotiate with the industrialists to get them to help restart our rearmament if we agree to some of their terms. Some policy changes to benefit them are more than reasonable and in our interests."
CZE_expand_existing_armory_plants: "Expand Existing Armory Plants"
CZE_expand_existing_armory_plants_desc: "Moving some of our existing armory locations will be a costly investment with little long-term gain. Expanding our existing locations would provide the benefits and opportunities to expand production and research and development at these current locations. Even at the risk of them being in locations that are easier to attack by possible enemies."
CZE_expand_skoda_offices: "Expand Škoda's Offices"
CZE_expand_skoda_offices_desc: "Our international offices are what drive sales of our weapons. Expanding them to new locations is a sensible decision."
CZE_skoda_office_unlock_tt: "Unlocks Decision: §YBuild Weapons Sales Office§!"
CZE_complete_the_power_grid: "Complete the Power Grid"
CZE_complete_the_power_grid_desc: "The power grid in our rural areas needs further work. It's fallen behind the rest of the country and is a hurdle in making more economic progress"
CZE_build_the_slapy_reservoir: "Build the Slapy Reservoir"
CZE_build_the_slapy_reservoir_desc: "Building a Dam near Slapy would lead to greater power generation and economic opportunities in the area. The increase in power generation will greatly help in growing our industry in the region."
CZE_diversify_refinery_processes: "Diversify Refinery Processes"
CZE_diversify_refinery_processes_desc: "Our wells would be able to produce a wide range of different oil byproducts. The only problem is that we lack the know-how to make it happen. If we invest research time into figuring out how, we'll be able to make this dream a reality."
CZE_enlarge_smaller_wells: "Enlarge Smaller Wells"
CZE_enlarge_smaller_wells_desc: "Despite their size, our smaller wells can produce a lot more than the tiny amount of oil they currently produce. All we have to do is invest the time to make it happen."
CZE_develop_sudetenland_resources: "Develop Sudetenland Resources"
CZE_develop_sudetenland_resources_desc: "The Sudetenland has a lot of resource deposits that we aren't currently tapping into. It would be a mistake not to invest in building more mines in the area."
CZE_grow_tatras_capabilities: "Grow Tatra's Capabilities"
CZE_grow_tatras_capabilities_desc: "Tatra's currently small tank department has some novel production designs. Giving them additional resources will allow them to continue to make advancements in armor design."
CZE_bailout_moser: "Bail Out Moser"
CZE_bailout_moser_desc: "Moser has fallen on hard times in the wake of the great depression. Their industries need to be bailed out, plants reopened, and people who were laid off put back to work."
CZE_merge_skodas_consumer_good_plants: "Merge Škoda's Consumer Good Plants"
CZE_merge_skodas_consumer_good_plants_desc: "Škoda has a lot of smaller consumer goods plants in their portfolio that aren't centralized. It would help optimize their production in many areas of those plants. It could also have some positive effects for Škoda in general."
CZE_giant_of_central_europe_industry: "Giant of Industry"
CZE_giant_of_central_europe_industry_desc: "Heights previously thought impossible. We are now a titan of industry within Europe!"
CZE_continue_armed_force_reform: "Continue Armed Forces Reform"
CZE_continue_armed_force_reform_desc: "By continuing to modernize our armed forces according to the planned schedule and reassigning military regions toward our provincial headquarters, we will achieve better coordination in any potential conflicts."
CZE_air_force_officer_recruitment: "Air Force Officer Recruitment"
CZE_air_force_officer_recruitment_desc: "Aero clubs across the states, in collaboration with the Air Force Reserve Officers' School, meet the critical need for reserve officers by offering flying courses and live-fire exercises."
CZE_national_defense_act: "National Defense Act"
CZE_national_defense_act_desc: "This defense act encompasses all measures, whether military or otherwise, intended to counter any threat to or attack on the sovereignty, integrity, unity, and security of our nation, under the supervision of the Supreme Council of National Defence (NROS)."
CZE_car_and_oil_rationing: "Car and Oil Rationing"
CZE_car_and_oil_rationing_desc: "Rationing private motor vehicles and requisitioning them as needed would allow us to focus automotive production and petroleum resources for military needs."
CZE_expand_airfield_capacity: "Expand Airfield Capacity"
CZE_expand_airfield_capacity_desc: "The 3rd Department of Aviation has planned for new aerodromes and hangars to properly operate, store, and repair our aircraft, as well as dormitories for our recently established squadrons and ground crew."
CZE_trust_in_old_guard: "Trust in the Old Guard"
CZE_trust_in_old_guard_desc: "The aerial skills and experience from the Great War will be passed on to the new generation by the veterans, in whom we place steadfast trust."
CZE_expand_the_aero_clubs: "Expand the Aero Clubs"
CZE_expand_the_aero_clubs_desc: "Aero clubs have proven their usefulness in providing a steady stream of talented pilots for our country; we should further expand them."
CZE_invest_in_the_smaller_air_plants: "Invest in Smaller Air Plants"
CZE_invest_in_the_smaller_air_plants_desc: "Investing in new and smaller aircraft manufacturers introduces necessary rivalry to our established counterparts; they could assist in handling our broader production requirements."
CZE_continue_avia_expansion: "Continue Avia Expansion"
CZE_continue_avia_expansion_desc: "Investing in Avia provides the additional hardware needed to further strengthen their production capacity; this could assist in achieving greater efficiency in producing airframes that are in high demand."
CZE_increase_military_aeronautical_institute_funding: "Increase Military Aeronautical Funding"
CZE_increase_military_aeronautical_institute_funding_desc: "By constructing additional facilities for Aerospace Research and Test Establishment (VZLÚ), it provides better insights into aerodynamics, further advancing and refining our aircraft design."
CZE_air_training_abroad: "Air Training Abroad"
CZE_air_training_abroad_desc: "By sending trainees to the air branches of nations friendly towards us, we gain valuable insights from diverse perspectives and first-hand experience when they return to serve."
CZE_establish_air_defense_zones: "Establish Air Defense Zones"
CZE_establish_air_defense_zones_desc: "We could allocate our new anti-aircraft batteries at key points and factories, and establish Air Defense Zones through communication nodes at the territorial level to optimize our anti-air accuracy."
CZE_establish_air_defense_zones_enable_tt: "Enables §YAir Defense Zones§!"
CZE_establish_air_defense_zones_tt: "Static Anti Air hit chance factor: §G+10%§!"
CZE_the_air_is_our_sea: "The Air is Our Sea"
CZE_the_air_is_our_sea_desc: "Underneath systematic pilot training, empower our pilots to fly bravely and confidently, 'We have neither ocean ports nor ocean-going ships. The air is our sea.'"
CZE_bring_kramer_and_lobel_under_state_control: "Bring Kramer & Löbl Under State Control"
CZE_bring_kramer_and_lobel_under_state_control_desc: "By nationalizing Kramer & Löbl, we could ensure continuous research and timely delivery of essential electrical supplies and radio accessories."
CZE_second_to_none: "Second To None"
CZE_second_to_none_desc: "Our aircraft industries' plane designs are improving by the day. With further research, our designs will be second to none in the world!"
CZE_diversify_airframe_production: "Diversify Airframe Production"
CZE_diversify_airframe_production_desc: "We can't just rely on our fighters to get things done in the air. Other aircraft and larger airframes are needed to fulfill other mission types."
CZE_projekt_l_52: "Projekt L 52"
CZE_projekt_l_52_desc: "Jet engine technology is the future of military aircraft. The technology is still a bit rough at the moment, but if we take the time to develop a dedicated project and design an airframe purpose-built for it, we can stay ahead of the curve."
CZE_fund_vladimir_mandl_research: "Fund Vladimir Mandl's Research"
CZE_fund_vladimir_mandl_research_desc: "A lawyer by the name of $CZE_vladimir_mandl$ is fascinated with the idea of rocket technology. If we work with him and provide the resources he needs to turn his research into practical technology, we could greatly benefit from this partnership."
CZE_mobilize_the_reserves: "Mobilize the Reserves"
CZE_mobilize_the_reserves_desc: "The tension at our border is worsening. We must call up reservists and preselected military specialists in accordance with our mobilization cards."
CZE_three_kings: "Three Kings"
CZE_three_kings_desc: "Aiding our resistance groups in an official capacity will greatly increase their ability to do damage to the army. It may also help our army in the field as well."
CZE_form_the_state_defense_guard: "Form the State Defense Guard"
CZE_form_the_state_defense_guard_desc: "By establishing the SOS, we enable an organization specialized in protecting our lengthy borders. Since the members of the guard are militarily organized and trained, they will serve as the first line of defense against any border incursion."
CZE_expand_the_horska_divisions: "Expand the Horská Divize"
CZE_expand_the_horska_divisions_desc: "As our country consists mostly of low hills and plateaus, our soldiers who are specially trained for mountain warfare will be crucial in those difficult terrains."
CZE_develop_horska_artillery: "Develop Horská Artillery"
CZE_develop_horska_artillery_desc: "By modifying our current artillery to be lightweight and disassemblable, we will ensure our troops have sufficient firepower in mountainous and hilly terrains."
CZE_develop_horska_artillery_tech_tt: "Enables §YHorská Artillery§!\n§YArtillery (Mountains)§!\n  Attack: §G+10%§!\n  Movement: §G+10%§!\n§YArtillery (Hills)§!\n  Attack: §G+10%§!\n  Movement: §G+10%§!"
CZE_bribery_investigations: "Bribery Investigations"
CZE_bribery_investigations_desc: "We have received an anonymous letter regarding the meals and treatment of soldiers. Some of the evidence points to improper conduct by certain quartermaster officers. We must put an end to this before it causes greater harm to our military."
CZE_bribery_investigations_remove_effect_tt: "This national spirit will be removed upon completion of the focus '§Y$CZE_bribery_investigations$§!'"
CZE_opl_exercises: "OPL Exercises"
CZE_opl_exercises_desc: "By conducting anti-aircraft defense (OPL) drills, our army could practice maneuvering with improved coordination and preservation, thereby enhancing overall troop movements and security."
CZE_rapid_response_divisions: "Rapid Division"
CZE_rapid_response_divisions_desc: "Foreign military has demonstrated the impact of a mobile unit capable of repositioning more quickly than the enemy, highlighting its potential. We could establish similar units for evaluation."
CZE_redouble_tank_development_efforts: "Redouble Tank Development Efforts"
CZE_redouble_tank_development_efforts_desc: "Our current light tank design is improvable compared to those of other armor users in Europe. We must redouble our efforts to ensure we are on par with them."
CZE_rearmed_and_retooled: "Rearmed, Retooled"
CZE_rearmed_and_retooled_desc: "Our current heavier tank chassis shows capacity for modernization. We should continue to explore this direction to meet the future expansion of our armored corps."
CZE_establish_the_fall_backlines: "Establish the Fallback Lines"
CZE_establish_the_fall_backlines_desc: "We need to be realistic in the fact that in some places our defenses will break. If that happens, having ready-made fallback lines will be the difference between victory and defeat."
CZE_establish_the_fall_backlines_masterful_delay_tactic_tt:0 "\nEnables Tactic: §Y$tactic_masterful_delay$§!"
CZE_anti_tank_development: "Anti-Tank Gun Development"
CZE_anti_tank_development_desc: "With more armies fielding larger and larger armored forces, improvements in our anti-tank guns are a must. Being able to deal with tanks with field pieces is the difference between holding the enemy back and them getting through."
CZE_anti_tank_development_tech_tt: "Enables §YAnti-Tank Improvements§!\n§YArtillery§! Piercing: §G+5%§!\n§YSupport Artillery§! Piercing: §G+5%§!\n§YAnti-Tank§! Piercing: §G+5%§!\n§YSupport Anti-Tank§! Piercing: §G+5%§!"
CZE_recon_in_force: "Recon in Force"
CZE_recon_in_force_tech_tt: "Enables §YRecon in Force§! \n§YRecon§!: HP: §G+5§!\nReconnaissance: §G+10.0%§!."
CZE_recon_in_force_desc: "Having our recon make contact with the enemy while probing their defenses is an invaluable way to grain intel."
CZE_integrate_fortification_engineers: "Integrate Fortification Engineers"
CZE_integrate_fortification_engineers_desc: "When our army fortification engineers are not spending time building static fortifications, we can quickly switch them to frontline duties to improve our defenses. This would aid frontline forces in making better temporary defense structures for our troops."
CZE_integrate_fortification_engineers_tech_tt: "Enables §YIntegrated Fortification Engineers§!\n§YEngineer Company§!:\nEntrenchment §G+10.00%§!.\n§Y(Fort)§!\n Defense §G+10.0%§!"
CZE_concealment_efforts: "Concealment Efforts"
CZE_concealment_efforts_desc: "The widespread use of ground attack and reconnaissance planes has now made camo netting and other concealment tactics a necessity. We need to strengthen our efforts in making sure our troops are well camouflaged in the field."
CZE_concealment_efforts_tech_tt: "Enables §YImproved Camo Netting§! \n§YLeg Infantry (Forest)§!\n Defense: §G+10%§!"
CZE_elevate_the_vsv: "Elevate the War College"
CZE_elevate_the_vsv_desc: "Being the brain of the military is a tremendous national and state responsibility. Therefore, the service of the General Staff requires officers of the best qualities in terms of professional training as well as in terms of reliability, self-control, tact, and character."
CZE_continue_with_snejdareks_plan_dynamic: "[CZE_continue_with_snejdareks_plan]"
CZE_continue_with_snejdareks_plan_default: "Continue with Šnejdárek's Plan"
CZE_continue_with_snejdareks_plan_no_snejdareks: "Continue with the Static Defense Plan"
CZE_continue_with_snejdareks_plan_dynamic_desc: "The conduct of an effective defense network prevents unexpected penetration by enemy troops. It provides protection and creates a strong base for transitioning from strategic defense to offense."
CZE_go_with_vojcechovskys_plan_dynamic: "[CZE_go_with_vojcechovskys_plan]"
CZE_go_with_vojcechovskys_plan_default: "Go with Luža's Plan"
CZE_go_with_vojcechovskys_plan_no_luza: "Active Defense Doctrine"
CZE_go_with_vojcechovskys_plan_dynamic_desc: "The disadvantage of static defenses is that they cannot be maneuvered. Once breached, they can no longer be used for offensive purposes but only as remnants for the initial location."
CZE_improve_the_current_officer_pool: "Improve the Current Officer Pool"
CZE_improve_the_current_officer_pool_desc: "We will promote personnel who have shown the capacity to be the backbone of our army, as they are essential in performing supervisory and coordination roles between higher commands and local units."
CZE_elevate_slovak_officers: "Elevate Slovak Officers"
CZE_elevate_slovak_officers_desc: "We will focus on elevating Slovakians to ensure better representation within the ranks. By lowering some requirements for applicants from the Slovak districts, we anticipate improved cohesion within the army in the future."
CZE_promote_moravec_writings: "Promote Moravec's Writings"
CZE_promote_moravec_writings_desc: "Despite Moravec's works 'Soldiers and Time' and 'State Defense' provoking very contradictory reactions, his recently published 'Military Importance of our state in Central Europe' was discussed in the daily press across Europe. We must encourage him to continue his work as an unequivocal expert on issues of defense policy and military history."
CZE_lessons_of_war: "Lessons of War"
CZE_lessons_of_war_desc: "With combat experience against a peer now under our belt, we can take these lessons and use them to improve our high command. There is no replacement for the lessons learned from real engagements with the army."
CZE_lessons_of_war_i_had_war_with_major_flag: "Was in a war with a Major Country"
CZE_for_the_homeland: "For the Homeland"
CZE_for_the_homeland_desc: "With our military fully prepared for the challenge ahead, we can now say with certainty that we are prepared to defend the homeland. We are ready for any task that lies before us."
CZE_the_lions_roar: "The Lion's Roar"
CZE_the_lions_roar_desc: "The symbol of the Czechoslovakian Lion represents the best qualities of our army. Courage, power, and heroism of the highest degree. Everyone will know the unmatched spirit of our armed forces."
CZE_diversify_our_specialists: "Diversify our Specialists"
CZE_diversify_our_specialists_desc: "We need to diversify our specialists beyond the realm of Horska troops. War is fought in places other than mountains and hilltops."
CZE_merge_the_financial_and_state_guard: "Merge the Financial and State Guard"
CZE_merge_the_financial_and_state_guard_desc: "With the formation of the State Defense Guard, the financial guards are no longer needed. Merging them into the State Defense Guard would help increase the strength of the SOS quickly."
CZE_merge_the_financial_and_state_guard_tt: "Enables §YIntegrated Financial Guard§! \n§YMilitary Police§!: HP: §G+5§!."
CZE_logistics_beyond_the_sudetes: "Logistics Beyond the Sudetes"
CZE_logistics_beyond_the_sudetes_desc: "If we hope to conduct combat operations outside of the Sudetes Mountains, we need to learn about how long-distance logistics work. It's very different from operating in just our home area."
CZE_logistics_beyond_the_sudetes_tt: "Enables §YImproved Supply Dumps§!\n§YLogistics Company§!: Supply Usage: §G-10%§!"
CZE_expand_the_river_monitor_fleet: "Expand the River Monitor Fleet"
CZE_expand_the_river_monitor_fleet_desc: "Our river monitor fleet is one of the largest in Europe and helps our army with the defense of inland areas. Expanding it would greatly increase their ability to do this task."
CZE_the_tvp_project: "The TVP Project"
CZE_the_tvp_project_desc: "Our army has proposed a General Use Tank (TVP) program to develop a domestic tank design. Some of our manufacturers, who have extensive experience in producing tanks, have shown interest in our project."
CZE_expand_the_land_department_of_vtu: "Expand the Land Department of VTÚ"
CZE_expand_the_land_department_of_vtu_desc: "By expanding the land department of the Military Technical Institute (VTÚ), they would gain additional hardware and proving grounds to bolster their research efforts for our future equipment."
CZE_department_two_expansion: "Department Two Expansion"
CZE_department_two_expansion_desc: "Our intelligence wing, Department 2, needs more resources to better protect us from enemy spies. This could also lead to the expansion of specific wings within the agency."
CZE_military_intelligence: "Military Intelligence Wing"
CZE_military_intelligence_desc: "Military intelligence is one of the most important aspects of an intelligence agency. Allocating more resources to this area would yield significant benefits."
CZE_air_intelligence: "Air Intelligence Wing"
CZE_air_intelligence_desc: "Knowing the number of planes in an enemy air force is a critical component of winning the air war. Accurate information on the enemy's aerial forces is key when engaging them in the area."
CZE_within_the_eagles_nest: "Within the Eagles Nest"
CZE_within_the_eagles_nest_desc: "Having an army of informants and saboteurs just outside our doorstep would be a huge advantage for our military. With aid from Department 2, our spy networks in these locations could grow to be extensive."
CZE_restart_naval_gun_production: "Restart Naval Gun Production"
CZE_restart_naval_gun_production_desc: "Škoda Works used to be the biggest naval gun designer and producer within the Austria-Hungarian Empire. Restarting production would create opportunities to revive domestic naval manufacturing."
CZE_restart_naval_gun_production_tt: "§YŠkoda Priority§! Naval Focus becomes §YActive§!"
CZE_reform_the_naval_detachment: "Reform the Naval Detachment"
CZE_reform_the_naval_detachment_desc: "The Naval Detachment was recently disbanded as it was deemed more suitable to be integrated into the army. However, recent events have made it so it's now a necessity to reform it."
CZE_build_2_dockyards_when_we_have_coast_tt: "Will Instantly Build §G2§! §YNaval Dockyards§! in a random coastal §YState§! when one is controlled."
CZE_skoda_naval_yards: "Škoda Naval Yards"
CZE_skoda_naval_yards_desc: "Now that we have access to the sea once more we can restart the old naval industries of the Austro-Hungarian Empire using the existing expertise still present within our borders. Getting domestic dockyards up and running should be a top priority."
CZE_build_3_dockyards_when_we_have_coast_tt: "Will Instantly Build §G3§! §YNaval Dockyards§! in a random coastal §YState§! when one is controlled."
CZE_legacy_of_the_kriegsmarine: "Legacy of the Kriegsmarine"
CZE_legacy_of_the_kriegsmarine_desc: "Having aided in the building of large battleships not so long ago, the ability to do so is very much possible. It's in the legacy of the same factories that helped build out the Austria-Hungarian Kriegsmarine."
CZE_build_off_old_ganz_danubius_designs: "Build off Old Ganz Danubius Designs"
CZE_build_off_old_ganz_danubius_designs_desc: "Resurfacing designs from Ganz Danubius could prove useful in building new cruiser-class ships. People knowledgeable about these designs still live within our borders."
CZE_modernize_trieste_designs: "Modernize Trieste Designs"
CZE_modernize_trieste_designs_desc: "By using old designs from the Austria-Hungarian Navy for smaller-sized battleships, we'll have better insight on how to build this class of ship."
CZE_leverage_gunboat_experience: "Leverage Gunboat Experience"
CZE_leverage_gunboat_experience_desc: "Our experience with gunboat design can be leveraged for the making of destroyers. Our current expertise base would help speed up the design process."
CZE_revive_kraljevica_designs: "Revive Kraljevica Designs"
CZE_revive_kraljevica_designs_desc: "By using our knowledge of gunboats, and by studying old Kraljevica designs. We can revive this class of destroyers for our nation."
CZE_wolfs_of_bohemia: "Wolfs of Bohemia"
CZE_wolfs_of_bohemia_desc: "Given the experience with submarines that still exist within our borders. It wouldn't be too hard to make wolfpacks of our own."
CZE_raider_lineage: "Raider Lineage"
CZE_raider_lineage_desc: "We have a lineage of raiding from former officers who were in the Austria-Hungarian Navy. We should leverage that experience."
CZE_a_modern_navy: "Modern Navy"
CZE_a_modern_navy_desc: "Now that we have made advances in our naval technologies, we can finally say that we have a modern and capable Navy."
CZE_build_1_dockyards_when_we_have_coast_tt: "Will Instantly Build §G1§! §YNaval Dockyards§! in a random coastal §YState§! when one is controlled."
CZE_naval_aviation: "Naval Aviation"
CZE_naval_aviation_desc: "Carriers and their planes seem to be the future of naval warfare. We need to invest time in these new areas of naval combat."
CZE_across_the_atlantic: "Across the Atlantic"
CZE_across_the_atlantic_desc: "A navy needs to reach out across the ocean to be effective. We need to make our Navy one that can move across long distances."
CZE_joint_equipment_designs: "Joint Equipment Designs"
CZE_joint_equipment_designs_desc: "Both [ROOT.GetNameDef] and [GER.GetNameDef] are at the forefront of tank and plane design, each with our own specialties, we should seek to share information so we can keep focusing on what we do best."
CZE_negotiate_sphere_of_influence: "Negotiate Sphere of Influence"
CZE_negotiate_sphere_of_influence_desc: "It is undeniable that the military resources of [ROOT.GetNameDef] are of great value to the [GER.GetAdjective] alliance. It is only fair that we request some territorial gains in return."
CZE_set_up_polish_puppet_state: "Set up Southern [POL.GetAdjective] Puppet State"
CZE_set_up_polish_puppet_state_desc: "Since [GER.GetNameDef] is interested in establishing a puppet state in Poland, it is obvious that we should look into doing the same."

#Exile Focus
CZE_prepare_for_exile: "Prepare for Exile"
CZE_prepare_for_exile_desc: "The state should covertly assist the efforts of our political leaders to escape abroad and set up a government in exile."
CZE_joins_government_in_exile_tt: "Joins §Ythe Government in Exile§!"
CZE_infiltrate_collaborationist_organizations: "Infiltrate Collaborationists"
CZE_administrative_chaos_tt: "Effect §Yfor the Reichskommissariat§! when §Y$CZE_enter_exile$§! is Completed:"
CZE_infiltrate_collaborationist_organizations_desc: "[ROOT.GetAdjective]s loyal to the government-in-exile being installed to lead collaborationist organizations may sound odd, but it is the perfect way to undermine and stay informed of their activities."
CZE_enter_exile: "Go Into Exile"
CZE_enter_exile_desc: "With potential allies now finally fighting the [GER.GetAdjective] alligator, our government can prepare and fight for a return of our sovereignty."
CZE_refused_exile: "Refused to host [ROOT.GetName]"
CZE_contact_the_czech_and_slovak_legion: "Contact the Czech and Slovak Legion"
CZE_contact_the_czech_and_slovak_legion_desc: "Brave [ROOT.GetAdjective]s have escaped to [POL.GetNameDef] and [FRA.GetNameDef] to continue the fight for a free [CZE.GetName], we should contact these forces and coordinate them."
CZE_skoda_priority_shortcut_finder: "Škoda Priority"
CZE_skoda_priority_shortcut_finder_desc: "This is Škoda's Current Priority"

