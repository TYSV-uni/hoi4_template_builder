#Germany
GER_integrate_czech_manufacturers: "Integrate Czech Manufacturers"
GER_integrate_czech_manufacturers_desc: "The industry located in Bohemia contains is a goldmine of manufacturing expertise and industrial resources for our economy. The additional industrial power that Bohemia Manufacturers would add would be a huge boost to our armament industry. It makes perfect sense to integrate them into our production lines."
GER_integrate_czech_manufacturers_no_aat_tt: "§GAvailable§! as §YDesign Companies§!:\n§Y$CZE_skoda_works_german_organization$§!, §Y$CZE_bohmische_mahrische_maschinenfabrik_ag_german_organization$§!, §Y$CZE_zlin_aircraft_organization$§!, and §Y$CZE_ceska_zbrojovka_uhersky_brod_organization$§!"
CZE_unlocks_sokolov_raid_pfot_tt: "Unlocks §YParatrooper Raid§! on §YFalknov§!"
