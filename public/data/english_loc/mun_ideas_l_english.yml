#Dynamic Modifiers National Spritits
CZE_ceskoslovenska_armada_dynamic_modifier: "Ceskoslovenska Armada"
CZE_ceskoslovenska_armada_dynamic_modifier_desc: "The Armada was built from the ashes of Austro-Hungarian Czech Units and the Veterans of the Czechoslovak Legion. The legacy of both still influence how the Armada is run." 
CZE_ceskoslovenske_letectvo_dynamic_modifier: "Ceskoslovenske Letectvo"
CZE_ceskoslovenske_letectvo_dynamic_modifier_desc: "The planes might not always be ready, but our pilots always are. With possible aerial threats from all sides, we must make the air our sea. Every single pilot must count as if they're three."
CZE_a_divided_nation_dynamic_modifier: "Divided Nation" 
CZE_a_divided_nation_dynamic_modifier_desc: "The [CZE.GetAdjective] state has stood alone in Central Europe as a pluralist state that has protected all within her borders. However, the Great Depression has changed that. Economic hardships have caused resentment to build up against the government from various movements within the country. These resentments are now deeply dividing the nation."
CZE_skoda_works_dynamic_modifier: "Škoda Works"
CZE_skoda_works_dynamic_modifier_desc: "The Škoda company contains production, construction, and investments in all sectors of our Heavy Industry. Its reach knows no bounds within our borders."
CZE_ceskoslovenske_alecne_lodstvo_dynamic_modifier: "Československé válečné loďstvo"

#Dynamic State Modifiers
CZE_sudetenland_german_state_modifier: "Sudetenland Separatism"
CZE_sudetenland_german_state_modifier_desc: "Recent economic hardships have befallen industry within the Sudetenland. This has caused the people living in the region to blame the [ROOT.getname] government for their recent misfortunes."
CZE_tesinko_polish_state_modifier: "Polish Separatism"
CZE_czech_state_modifier: "Shortage of Skilled Czech Workers"
CZE_czech_state_modifier_desc: "The fast economic development of the 20th century has been taxing a largely agrarian Czech population. The ability to fill positions with skilled and qualified labor with Czech workers is hard. Efforts must be made to help to prepare young Czech citizens for the changing needs of a modern economy."
CZE_slovakia_state_modifier: "Uneven Economic Development"
