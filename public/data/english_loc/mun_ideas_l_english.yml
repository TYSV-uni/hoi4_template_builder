CZE_first_sudetenland_fortification_program_GD: "First Sudetenland Fortification Program"
CZE_sudetenland_paramilitaries_modifier: "Sudetenland Paramilitary Activity"
CZE_sudetenland_paramilitaries_modifier_desc: "Sudetenland partisans and paramilitaries are currently undermining our forces in this region. They are actively attacking our troops and collaborating with our enemies."
