#National Spirits
CZE_taticek_of_czechoslovakia: "Tatíček Masaryk"
CZE_taticek_of_czechoslovakia_desc: "Tomáš Masaryk, often called 'Tatíček Masaryk', meaning 'daddy' or 'father' (of the nation), has been a bedrock of the Czechoslovak nation since its founding. When coalitions were thought impossible to build and political impasses too big to overcome, Masaryk, time after time, was able to pull off political miracles to help strengthen and grow Czechoslovakia. Even in retirement, his sentiments and suggestions to the political leadership are taken more as orders then advice."
CZE_industrialists_veto: "Industrialist's Veto"
CZE_industrialists_veto_desc: "The industrialists wield considerable influence over the country's politics, as they stand at the head of many of [CZE.GetNameDef]'s largest conglomerates. Their concerns cannot be ignored in matters of economic policy, and economic mobilization is among the measures they would most fiercely resist."
CZE_agrarian_politics_1: "Agrarian Politics"
CZE_agrarian_politics_1_desc: "Despite our country's industrial nature, farmers and rural peasants have considerable political sway in many political parties. Their sentiment often influences economic policy decisions, and are a constant political hurdle in making further industrial progress."
CZE_directorate_of_fortification_works_no_gd_idea: "Directorate of Fortification Works"
CZE_directorate_of_fortification_works_no_gd_idea_desc: "The $CZE_directorate_of_fortification_works_no_gd_idea$, better known as the ROP. Is the management enity in charge of overseeing fortification efforts in the country."
CZE_czech_corporatism: "Czech Corporatism"
CZE_broken_shield: "Broken Shield"
CZE_redirected_fortification_council_funds: "Redirected Fortification Council Funds"
CZE_army_readiness_1: "Unprepared Army"
CZE_army_readiness_1_desc: "An army's readiness isn't all about men and equipment in the field. Having confidence in your preparations, and backing of the country's political and industrial leaders matters when facing down threats. Having the means to fight is one thing, the ability to do so effectively is another."
CZE_army_readiness_3: "Prepared Army"
CZE_army_readiness_3_desc: "An army's readiness isn't all about men and equipment in the field. Having confidence in your preparations, and backing of the country's political and industrial leaders matters when facing down threats. Having the means to fight is one thing, the ability to do so effectively is another."
CZE_ready_for_anything_idea: "Ready for Anything"
CZE_sudeten_german_quandary: "The Sudetenland Quandary"
CZE_sudeten_german_quandary_desc: "While a majority of people living in the Sudetenland just want greater autonomy under the existing government, many Sudeten political parties and their supporters could quickly become a fifth column if a German state sought to annex any part of the region."
CZE_sudeten_german_quandary_modifier_tt: "§YPassive Effect§!:\nIf §Y[AUS.GetFlag][AUS.GetNonIdeologyName]§!, §Y[GER.GetFlag][GER.GetNonIdeologyName]§!, or any other [BAY.GetFlag]§YGerman Country§! that borders us justifies or gains a §RWar Goal§! on us while either §Y[69.GetName]§!, §Y[972.GetName]§! or §Y[74.GetName]§! are controlled by us:\n - (§YAll Controlled Sudetenland States§!):\n    Add §Y$CZE_sudetenland_paramilitaries_modifier$§! which grants:\n       $MODIFIER_LOCAL_INTEL_TO_ENEMIES$: §R+10%§!\n       $MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$: §R-10.0%§!\n       $modifier_state_repair_speed_bunker_factor$: §R-10.00%§!\n\n - This §YEffect§! can only happen once"
CZE_sudeten_challenge: "The Sudeten Challenge"
CZE_sudeten_challenge_desc: "Recent activity by Sudetenland Paramilitaries within the Sudetenland has made many in the international community believe that the current aggressive actions against us is justified! It'll take time to convince the world otherwise."
CZE_sudeten_facde: "The Sudeten Facade"
CZE_sudeten_facde_desc: "By not backing local Paramilitaries our justifications for our actions against [CZE.getname] are now seen as a facade throughout the world."
